<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MiniChat</title>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
    </script>

    <style>
        /* ==========================================
           全局重置 & 深色主题变量
           ========================================== */
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-sidebar: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2a2a2a;
            --bg-hover: #2a2a2a;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #2a2a2a;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* ===== 应用容器 ===== */
        .app {
            width: 100%;
            max-width: 1300px;
            height: 96vh;
            max-height: 900px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* ==========================================
           Preloader（中间品牌图 + Cloudflare 风格动画）
           ========================================== */
        .preloader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 220;
            pointer-events: none;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }
        .preloader-inner {
            display: flex;
            align-items: center;
            gap: 32px;
            background: transparent;
            padding: 12px 20px;
            border-radius: 12px;
        }
        .preloader-inner img {
            height: 64px;
            width: 64px;
            object-fit: contain;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6));
        }
        /* 左右 logo 浮动 */
        @keyframes floatLeft {
            0% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-8px); opacity: 0.9; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes floatRight {
            0% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(8px); opacity: 0.9; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .preloader-left { animation: floatLeft 1.8s ease-in-out infinite; }
        .preloader-right { animation: floatRight 1.8s ease-in-out infinite; }

        /* 中间点阵旋转（Cloudflare 风格） */
        .preloader-spinner {
            position: relative;
            width: 56px;
            height: 56px;
        }
        .preloader-spinner .dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background: linear-gradient(180deg, #60a5fa, #3b82f6);
            border-radius: 50%;
            transform-origin: 28px 28px;
            opacity: 0.95;
            box-shadow: 0 6px 18px rgba(59,130,246,0.18);
            animation: spinScale 1.4s cubic-bezier(.4,0,.2,1) infinite;
        }
        .preloader-spinner .dot1 { top: 6px; left: 28px; animation-delay: 0s; }
        .preloader-spinner .dot2 { top: 28px; left: 6px; animation-delay: 0.12s; }
        .preloader-spinner .dot3 { top: 28px; left: 50px; animation-delay: 0.24s; }
        .preloader-spinner .dot4 { top: 50px; left: 28px; animation-delay: 0.36s; }

        @keyframes spinScale {
            0% { transform: scale(0.7); opacity: 0.6; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(0.7); opacity: 0.6; }
        }

        /* ==========================================
           登录界面（覆盖全屏）
           ========================================== */
        .login-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            border-radius: var(--radius);
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-card {
            background: var(--bg-card);
            padding: 40px 36px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-color);
        }

        .login-card .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .login-card .logo-area img {
            height: 36px;
            width: auto;
        }
        .login-card .logo-area h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .login-card .auth-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .login-card .auth-sub {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .login-card input {
            width: 100%;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            margin-bottom: 14px;
        }
        .login-card input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .login-card .code-row {
            display: flex;
            gap: 12px;
        }
        .login-card .code-row input {
            flex: 1;
            margin-bottom: 0;
        }
        .login-card .code-row .btn {
            padding: 14px 20px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .login-card .code-row .btn:hover {
            background: var(--bg-hover);
        }

        .login-card .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 6px;
        }
        .login-card .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }
        .login-card .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-card .auth-message {
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
            min-height: 20px;
        }
        .login-card .auth-message.success {
            color: #4ade80;
        }
        .login-card .auth-message.error {
            color: #f87171;
        }

        /* ==========================================
           主界面（左侧栏 + 右侧聊天）
           ========================================== */
        .main-interface {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .main-interface.hidden {
            display: none;
        }

        /* ----- 左侧边栏 ----- */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            flex-shrink: 0;
        }

        .sidebar .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .sidebar .logo-area img {
            height: 32px;
            width: auto;
        }
        .sidebar .logo-area span {
            font-size: 18px;
            font-weight: 600;
        }

        .sidebar .nav {
            flex: 1;
        }
        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .sidebar .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .sidebar .nav-item.active {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .sidebar .nav-item svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sidebar .user-section {
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            margin-top: auto;
        }
        .sidebar .user-email {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 8px 0;
        }
        .sidebar .logout-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            background: none;
            border: none;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
        }
        .sidebar .logout-btn:hover {
            background: var(--bg-hover);
            color: #f87171;
        }
        .sidebar .logout-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* ----- 右侧聊天区 ----- */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            min-width: 0;
        }

        .chat-main .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-main .chat-header .chat-title {
            font-size: 18px;
            font-weight: 600;
        }
        .chat-main .chat-header .chat-title small {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 10px;
        }

        .chat-main .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--bg-primary);
        }
        .chat-main .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-main .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-main .chat-messages::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }

        .chat-main .message {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeIn 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .chat-main .message.me {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 6px;
        }
        .chat-main .message.other {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
            border: 1px solid var(--border-color);
        }
        .chat-main .message .sender {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .chat-main .message.me .sender {
            color: rgba(255,255,255,0.8);
        }
        .chat-main .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 6px;
            text-align: right;
        }
        .chat-main .message img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            display: block;
            margin-top: 6px;
            cursor: pointer;
            border: none;
        }

        .chat-main .input-area {
            padding: 12px 24px 20px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .chat-main .input-area .attach-btn {
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .chat-main .input-area .attach-btn:hover {
            background: var(--bg-hover);
        }
        /* 统一图标尺寸并去掉可能影响显示的滤镜（确保可见） */
        .chat-main .input-area .attach-btn img {
            height: 24px;
            width: 24px;
            opacity: 0.95;
            filter: none;
        }
        .chat-main .input-area .attach-btn:hover img {
            opacity: 1;
        }

        .chat-main .input-area input[type="text"] {
            flex: 1;
            padding: 12px 18px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
        }
        .chat-main .input-area input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .chat-main .input-area .send-btn {
            background: var(--accent);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .chat-main .input-area .send-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }
        .chat-main .input-area .send-btn:active {
            transform: scale(0.94);
        }
        /* 发送按钮图标与附件图标保持相同大小 */
        .chat-main .input-area .send-btn img {
            height: 24px;
            width: 24px;
            filter: none;
            opacity: 0.98;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================
           响应式适配
           ========================================== */
        @media (max-width: 768px) {
            body { padding: 0; }
            .app { max-height: 100vh; border-radius: 0; }
            .sidebar { width: 200px; padding: 12px; }
            .sidebar .logo-area span { display: none; }
            .sidebar .nav-item span { display: none; }
            .sidebar .nav-item { justify-content: center; }
            .sidebar .user-email { font-size: 11px; text-align: center; }
            .sidebar .logout-btn { justify-content: center; }
            .chat-main .chat-header { padding: 12px 16px; }
            .chat-main .chat-messages { padding: 12px; }
            .chat-main .input-area { padding: 10px 16px 16px; }
            .login-card { padding: 28px 20px; }
            .preloader-inner img { height: 48px; width: 48px; }
            .preloader-spinner { width: 44px; height: 44px; }
        }

        @media (max-width: 480px) {
            .sidebar { width: 60px; padding: 8px; }
            .sidebar .logo-area img { height: 28px; }
            .sidebar .nav-item { padding: 10px; }
            .chat-main .message { max-width: 90%; }
            .preloader-inner img { height: 40px; width: 40px; gap: 12px; }
        }
    </style>
</head>

<body>

    <div class="app" id="app">

        <!-- Preloader -->
        <div class="preloader" id="preloader" aria-hidden="false">
            <div class="preloader-inner">
                <!-- 左侧 Inspired -->
                <img src="assets/Inspired.svg" alt="Inspired" class="preloader-left" onerror="this.style.display='none'"/>
                <!-- 中间 Cloudflare 风格点阵 -->
                <div class="preloader-spinner" aria-hidden="true">
                    <div class="dot dot1"></div>
                    <div class="dot dot2"></div>
                    <div class="dot dot3"></div>
                    <div class="dot dot4"></div>
                </div>
                <!-- 右侧 based -->
                <img src="assets/based.svg" alt="based" class="preloader-right" onerror="this.style.display='none'"/>
            </div>
        </div>

        <!-- ==========================================
             登录界面（覆盖层）
             ========================================== -->
        <div class="login-overlay" id="loginOverlay">
            <div class="login-card">
                <div class="logo-area">
                    <!-- Logo 本地文件 -->
                    <img src="assets/logo.svg" alt="Logo" onerror="this.style.display='none'" />
                    <h1>MiniChat</h1>
                </div>
                <div class="auth-title">欢迎回来</div>
                <div class="auth-sub">输入邮箱，获取验证码登录</div>

                <input type="email" id="authEmail" placeholder="电子邮箱" />
                <div class="code-row">
                    <input type="text" id="authCode" placeholder="6位验证码" maxlength="6" />
                    <button class="btn" id="btnSendCode">获取验证码</button>
                </div>
                <button class="btn-primary" id="btnLogin">登录 / 注册</button>
                <div class="auth-message" id="authMessage"></div>
            </div>
        </div>

        <!-- ==========================================
             主界面（左侧栏 + 右侧聊天）
             ========================================== -->
        <div class="main-interface hidden" id="mainInterface">

            <!-- 左侧边栏 -->
            <aside class="sidebar">
                <div class="logo-area">
                    <img src="assets/logo.svg" alt="Logo" onerror="this.style.display='none'" />
                    <span>MiniChat</span>
                </div>

                <nav class="nav">
                    <div class="nav-item active">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span>聊天</span>
                    </div>
                    <div class="nav-item">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.[...]
                        <span>设置</span>
                    </div>
                </nav>

                <div class="user-section">
                    <div class="user-email" id="sidebarUserEmail">未登录</div>
                    <button class="logout-btn" id="btnLogout">
                        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        退出
                    </button>
                </div>
            </aside>

            <!-- 右侧聊天主区域 -->
            <main class="chat-main">
                <div class="chat-header">
                    <div class="chat-title">
                        全局聊天
                        <small># 所有成员</small>
                    </div>
                    <div style="font-size:13px;color:var(--text-secondary);">
                        <span id="onlineStatus">● 在线</span>
                    </div>
                </div>

                <div class="chat-messages" id="messageList">
                    <!-- 消息动态渲染 -->
                </div>

                <div class="input-area">
                    <label class="attach-btn" title="发送图片">
                        <img src="assets/attach.svg" alt="附件" onerror="this.style.display='none'" />
                        <input type="file" id="fileInput" accept="image/*" style="display:none;" />
                    </label>
                    <input type="text" id="chatInput" placeholder="输入消息…" />
                    <button class="send-btn" id="btnSend">
                        <img src="assets/send.svg" alt="发送" onerror="this.style.display='none'" />
                    </button>
                </div>
            </main>
        </div>

    </div>

    <!-- ==========================================
         JavaScript 逻辑（保留原有功能）
         ========================================== -->
    <script>
        // Hide preloader on window load
        window.addEventListener('load', function() {
            const p = document.getElementById('preloader');
            if (p) {
                p.style.opacity = '0';
                p.style.visibility = 'hidden';
                setTimeout(() => { if (p && p.parentNode) p.parentNode.removeChild(p); }, 420);
            }
        });

        // ==========================================
        // 1. 配置
        // ==========================================
        const SUPABASE_URL = 'https://xgugltiuszrpmbxjmqfv.supabase.co';
        const SUPABASE_ANON_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhndWdsdGl1c3pycG1ieGptcWZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODE2MTUsImV4cCI6MjA5ODA1NzYxNX0.nWiJm_7Fh3-6MUdazhW7Cw[...]

        const WEBHOOK_AUTH = 'https://hook.us2.make.com/7bwoxm0lr1adzqy12jcq4xjk0hkugl2n';
        const WEBHOOK_SEND_MESSAGE = 'https://hook.us2.make.com/9csv6ub93wvhcm4wdmpzdccyeqbsqd5q';

        // ==========================================
        // 2. 初始化 Supabase
        // ==========================================
        if (!window.supabaseClient) {
            window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // ==========================================
        // 3. DOM 引用
        // ==========================================
        const loginOverlay = document.getElementById('loginOverlay');
        const mainInterface = document.getElementById('mainInterface');
        const authEmail = document.getElementById('authEmail');
        const authCode = document.getElementById('authCode');
        const authMessage = document.getElementById('authMessage');
        const messageList = document.getElementById('messageList');
        const chatInput = document.getElementById('chatInput');
        const sidebarUserEmail = document.getElementById('sidebarUserEmail');
        const btnSendCode = document.getElementById('btnSendCode');
        const btnLogin = document.getElementById('btnLogin');
        const btnSend = document.getElementById('btnSend');
        const btnLogout = document.getElementById('btnLogout');
        const fileInput = document.getElementById('fileInput');

        let currentEmail = '';
        let isCodeSending = false;

        // ==========================================
        // 4. 工具函数
        // ==========================================
        function formatTime(iso) {
            const d = new Date(iso);
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function setAuthMessage(msg, type) {
            authMessage.textContent = msg;
            authMessage.className = 'auth-message';
            if (type === 'success') authMessage.classList.add('success');
            if (type === 'error') authMessage.classList.add('error');
        }

        // 图片预览与下载
        window.previewImage = function(url) {
            const overlay = document.createElement('div');
            overlay.style.cssText =
                'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:20px;bo[...]

            const img = document.createElement('img');
            img.src = url;
            img.style.cssText =
                'max-width:100%;max-height:70%;object-fit:contain;border-radius:12px;margin-bottom:24px;box-shadow:0 10px 30px rgba(0,0,0,0.5);';

            const btnContainer = document.createElement('div');
            btnContainer.style.cssText = 'display:flex;gap:16px;flex-wrap:wrap;justify-content:center;';

            const downloadBtn = document.createElement('button');
            downloadBtn.textContent = '下载图片';
            downloadBtn.style.cssText =
                'padding:12px 28px;border:none;border-radius:10px;background:#3b82f6;color:#fff;font-size:15px;font-weight:500;cursor:pointer;touch-action:manipulation;box-shadow:0 4px 12px rgba(59,13[...]
            downloadBtn.onclick = function(e) {
                e.stopPropagation();
                downloadBtn.textContent = '下载中…';
                downloadBtn.disabled = true;
                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error('下载失败');
                        return res.blob();
                    })
                    .then(blob => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        const filename = url.split('/').pop().split('?')[0] || 'image.jpg';
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        URL.revokeObjectURL(a.href);
                        downloadBtn.textContent = '已下载';
                        setTimeout(() => {
                            downloadBtn.textContent = '下载图片';
                            downloadBtn.disabled = false;
                        }, 2000);
                    })
                    .catch(err => {
                        console.error('下载失败:', err);
                        downloadBtn.textContent = '下载失败';
                        setTimeout(() => {
                            downloadBtn.textContent = '下载图片';
                            downloadBtn.disabled = false;
                        }, 2000);
                    });
            };

            const closeBtn = document.createElement('button');
            closeBtn.textContent = '关闭';
            closeBtn.style.cssText =
                'padding:12px 28px;border:none;border-radius:10px;background:rgba(255,255,255,0.15);color:#fff;font-size:15px;font-weight:500;cursor:pointer;touch-action:manipulation;min-height:44px;m[...]
            closeBtn.onclick = function(e) {
                e.stopPropagation();
                document.body.removeChild(overlay);
            };

            btnContainer.appendChild(downloadBtn);
            btnContainer.appendChild(closeBtn);

            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    document.body.removeChild(overlay);
                }
            });

            overlay.appendChild(img);
            overlay.appendChild(btnContainer);
            document.body.appendChild(overlay);
        };

        // 添加消息
        function addMessage(content, sender, isMe, time) {
            const div = document.createElement('div');
            div.className = 'message ' + (isMe ? 'me' : 'other');

            if (!content) content = '';

            const imageMatch = content.match(/!\[image\]\((.*?)\)/);
            let displayContent = content;
            if (imageMatch) {
                const url = imageMatch[1];
                displayContent =
                    `<img src="${url}" onclick="window.previewImage && window.previewImage('${url}')" alt="图片" loading="lazy" />`;
            } else {
                displayContent = content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            div.innerHTML = '<div class="sender">' + sender + '</div>' + displayContent +
                '<div class="time">' + (time || formatTime(new Date().toISOString())) + '</div>';
            messageList.appendChild(div);
            messageList.scrollTop = messageList.scrollHeight;
        }

        function setLoading(loading) {
            btnSendCode.disabled = loading;
            btnLogin.disabled = loading;
            btnSendCode.style.opacity = loading ? '0.6' : '1';
            btnLogin.style.opacity = loading ? '0.6' : '1';
        }

        // ==========================================
        // 5. 发送验证码
        // ==========================================
        window.handleSendCode = async function() {
            const email = authEmail.value.trim();
            if (!email || !email.includes('@')) {
                setAuthMessage('请输入有效的邮箱地址', 'error');
                return;
            }
            if (isCodeSending) return;
            isCodeSending = true;
            setLoading(true);
            setAuthMessage('正在发送…', '');

            try {
                const res = await fetch(WEBHOOK_AUTH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'send', email })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    setAuthMessage('验证码已发送，请查收邮件', 'success');
                    authCode.focus();
                } else {
                    setAuthMessage(result.message || '发送失败', 'error');
                }
            } catch (err) {
                console.error(err);
                setAuthMessage('网络错误，请重试', 'error');
            } finally {
                isCodeSending = false;
                setLoading(false);
            }
        };

        // ==========================================
        // 6. 验证码登录
        // ==========================================
        window.handleLogin = async function() {
            const email = authEmail.value.trim();
            const code = authCode.value.trim();
            if (!email) { setAuthMessage('请输入邮箱', 'error'); return; }
            if (!code || code.length !== 6) { setAuthMessage('请输入6位验证码', 'error'); return; }

            setLoading(true);
            setAuthMessage('登录中…', '');

            try {
                const res = await fetch(WEBHOOK_AUTH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'verify', email, inputCode: code })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    currentEmail = email;
                    setAuthMessage('登录成功', 'success');
                    enterChat();
                } else {
                    setAuthMessage(result.message || '验证码错误', 'error');
                }
            } catch (err) {
                console.error(err);
                setAuthMessage('网络错误', 'error');
            } finally {
                setLoading(false);
            }
        };

        // ==========================================
        // 7. 进入聊天
        // ==========================================
        function enterChat() {
            loginOverlay.classList.add('hidden');
            mainInterface.classList.remove('hidden');
            sidebarUserEmail.textContent = currentEmail;
            messageList.innerHTML = '';
            localStorage.setItem('minichat_user', JSON.stringify({ email: currentEmail }));
            subscribeMessages();
            loadHistory();
        }

        // ==========================================
        // 8. 退出登录
        // ==========================================
        window.handleLogout = function() {
            if (window.chatChannel) {
                window.chatChannel.unsubscribe();
                window.chatChannel = null;
            }
            currentEmail = '';
            mainInterface.classList.add('hidden');
            loginOverlay.classList.remove('hidden');
            authMessage.textContent = '';
            messageList.innerHTML = '';
            authCode.value = '';
            sidebarUserEmail.textContent = '未登录';
            localStorage.removeItem('minichat_user');
            setAuthMessage('已退出', '');
        };

        // ==========================================
        // 9. 发送消息核心
        // ==========================================
        async function sendMessageContent(content) {
            if (!currentEmail) {
                alert('请先登录');
                return;
            }
            addMessage(content, '我', true);

            try {
                const res = await fetch(WEBHOOK_SEND_MESSAGE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, sender_name: currentEmail })
                });
                if (!res.ok) throw new Error('发送失败');
                if (chatInput.value) chatInput.value = '';
            } catch (err) {
                console.error(err);
                if (messageList.lastChild) messageList.removeChild(messageList.lastChild);
                setAuthMessage('消息发送失败', 'error');
                setTimeout(() => {
                    if (authMessage.textContent === '消息发送失败') authMessage.textContent = '';
                }, 3000);
            }
        }

        // ==========================================
        // 10. 发送文本
        // ==========================================
        window.sendMessageHandler = async function() {
            const content = chatInput.value.trim();
            if (!content) return;
            await sendMessageContent(content);
        };

        // ==========================================
        // 11. 发送图片
        // ==========================================
        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                setAuthMessage('请选择图片文件', 'error');
                fileInput.value = '';
                return;
            }
            if (file.size > 20 * 1024 * 1024) {
                setAuthMessage('图片不能超过 20MB', 'error');
                fileInput.value = '';
                return;
            }

            const tempId = 'uploading_' + Date.now();
            const tempDiv = document.createElement('div');
            tempDiv.id = tempId;
            tempDiv.className = 'message me';
            tempDiv.innerHTML = '<div class="sender">我</div><span style="opacity:0.6;">上传中…</span>';
            messageList.appendChild(tempDiv);
            messageList.scrollTop = messageList.scrollHeight;

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.${fileExt}`;
                const filePath = `public/${fileName}`;

                const { data, error } = await window.supabaseClient.storage
                    .from('chat-images')
                    .upload(filePath, file, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (error) throw error;

                const { data: urlData } = window.supabaseClient.storage
                    .from('chat-images')
                    .getPublicUrl(filePath);
                const publicURL = urlData.publicUrl;

                const tempEl = document.getElementById(tempId);
                if (tempEl) tempEl.remove();

                const content = `![image](${publicURL})`;
                await sendMessageContent(content);
            } catch (err) {
                console.error('上传失败:', err);
                const tempEl = document.getElementById(tempId);
                if (tempEl) tempEl.remove();
                setAuthMessage('图片上传失败，请重试', 'error');
                setTimeout(() => {
                    if (authMessage.textContent === '图片上传失败，请重试') authMessage.textContent = '';
                }, 3000);
            } finally {
                fileInput.value = '';
            }
        });

        // ==========================================
        // 12. 加载历史
        // ==========================================
        async function loadHistory() {
            try {
                const { data, error } = await window.supabaseClient
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: true })
                    .limit(50);
                if (error) throw error;
                messageList.innerHTML = '';
                data.forEach(msg => {
                    const isMe = msg.sender_name === currentEmail;
                    addMessage(msg.content, msg.sender_name || '匿名', isMe, formatTime(msg.created_at));
                });
            } catch (err) {
                console.error('加载历史消息失败:', err);
            }
        }
