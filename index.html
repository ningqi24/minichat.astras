<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MiniChat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
    </script>
    <style>
        /* ===== 全局变量 ===== */
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-sidebar: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2a2a2a;
            --bg-hover: #2a2a2a;
            --bg-overlay: rgba(0, 0, 0, 0.7);
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #2a2a2a;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
            --avatar-size: 28px;
        }
        body.light-theme {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-sidebar: #f7f8fa;
            --bg-card: #ffffff;
            --bg-input: #eef0f2;
            --bg-hover: #e8eaed;
            --bg-overlay: rgba(255, 255, 255, 0.7);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #d0d5dd;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            transition: background 0.3s, color 0.3s;
        }
        .app {
            width: 100%;
            max-width: 1300px;
            height: 96vh;
            max-height: 900px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
            position: relative;
        }
        /* ===== Splash ===== */
        .splash {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #000000;
            z-index: 400;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            pointer-events: auto;
        }
        .splash.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .splash-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .splash-inner .splash-icon {
            height: 240px;
            width: 240px;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(59, 130, 246, 0.3));
        }
        .splash-divider {
            width: 2px;
            height: 80px;
            background: rgba(255, 255, 255, 0.6);
            flex-shrink: 0;
        }
        .splash-bar {
            width: 320px;
            max-width: calc(100% - 80px);
            height: 6px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
            margin-top: 4px;
        }
        .splash-bar .fill {
            height: 100%;
            width: 0%;
            background: #3b82f6;
            border-radius: 6px;
            transition: width 0.25s linear;
            animation: splashFill 1.8s linear 1 forwards;
        }
        @keyframes splashFill {
            from {
                width: 0%;
            }
            to {
                width: 100%;
            }
        }
        /* ===== 登录界面 ===== */
        .login-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-overlay);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            border-radius: var(--radius);
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .login-card {
            background: var(--bg-card);
            padding: 40px 36px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s;
        }
        .login-card .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .login-card .logo-area img {
            height: 40px;
            width: auto;
        }
        .login-card .logo-area h1 {
            display: none;
        }
        .login-card .auth-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .login-card .auth-sub {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .login-card input {
            width: 100%;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            margin-bottom: 14px;
        }
        .login-card input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .login-card .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 6px;
        }
        .login-card .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }
        .login-card .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .login-card .auth-message {
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
            min-height: 20px;
        }
        .login-card .auth-message.success {
            color: #4ade80;
        }
        .login-card .auth-message.error {
            color: #f87171;
        }
        .login-card .auth-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 14px;
            font-size: 14px;
        }
        .login-card .auth-toggle a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
        }
        .login-card .auth-toggle a:hover {
            text-decoration: underline;
        }
        .login-card .pwd-wrapper {
            position: relative;
        }
        .login-card .pwd-wrapper .toggle-pwd {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
        }
        /* ===== 侧边栏 Logo + 文字 ===== */
        .sidebar .logo-area .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-left: 4px;
            transition: color 0.3s;
        }
        @media (max-width: 480px) {
            .sidebar .logo-area .logo-text {
                display: none;
            }
        }
        /* ===== 主界面 ===== */
        .main-interface {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .main-interface.hidden {
            display: none;
        }
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            transition: background 0.3s, border-color 0.3s;
        }
        .sidebar .logo-area {
            display: flex;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .sidebar .logo-area img {
            height: 36px;
            max-width: 100%;
            object-fit: contain;
        }
        .sidebar .nav {
            flex: 1;
        }
        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .sidebar .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .sidebar .nav-item.active {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .sidebar .nav-item svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .sidebar .user-section {
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            margin-top: auto;
        }
        .sidebar .user-email {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 8px 0;
            word-break: break-all;
        }
        .chat-main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            transition: background 0.3s;
        }
        .chat-main .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-main .chat-header .chat-title {
            font-size: 18px;
            font-weight: 600;
        }
        .chat-main .chat-header .chat-title small {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 10px;
        }
        .chat-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .online-users-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
            position: relative;
        }
        .online-users-btn:hover {
            background: var(--bg-hover);
        }
        .online-users-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        .online-badge {
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            padding: 0 5px;
            font-size: 10px;
            min-width: 16px;
            height: 16px;
            line-height: 16px;
            text-align: center;
            display: none;
        }
        .online-badge.show {
            display: inline-block;
        }
        /* ===== 在线用户弹窗 ===== */
        .online-modal {
            display: none;
            position: absolute;
            top: 60px;
            right: 20px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            padding: 16px;
            min-width: 200px;
            max-width: 280px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 250;
        }
        .online-modal.active {
            display: block;
        }
        .online-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
        }
        .online-modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }
        .online-user-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .online-user-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
        }
        .online-user-item:last-child {
            border-bottom: none;
        }
        .online-user-item .avatar-small {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-input);
            flex-shrink: 0;
        }
        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            flex-shrink: 0;
        }
        .online-user-name {
            font-weight: 500;
        }
        .online-user-email {
            font-size: 10px;
            opacity: 0.6;
            margin-left: 4px;
        }
        .online-empty {
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            padding: 12px 0;
        }
        /* ===== 聊天消息样式（含头像） ===== */
        .chat-main .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--bg-primary);
            transition: background 0.3s;
        }
        .chat-main .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-main .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-main .chat-messages::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }
        .chat-main .message {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        .chat-main .message.me {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .chat-main .message.other {
            align-self: flex-start;
        }
        .chat-main .message .avatar-wrapper {
            flex-shrink: 0;
            cursor: pointer;
        }
        .chat-main .message .avatar-wrapper img {
            width: var(--avatar-size);
            height: var(--avatar-size);
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-input);
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .chat-main .message.me .avatar-wrapper img {
            border-color: var(--accent);
        }
        .chat-main .message .bubble {
            padding: 10px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 14px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            flex: 1;
            min-width: 0;
        }
        .chat-main .message.me .bubble {
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .chat-main .message.other .bubble {
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }
        .chat-main .message .sender {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .chat-main .message .sender .name {
            color: var(--text-primary);
        }
        .chat-main .message.me .sender .name {
            color: rgba(255, 255, 255, 0.9);
        }
        .chat-main .message .sender .email {
            font-size: 10px;
            font-weight: 400;
            opacity: 0.5;
        }
        .chat-main .message .message-content {
            margin-bottom: 4px;
        }
        .chat-main .message .message-content img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            display: block;
            margin-top: 4px;
            cursor: pointer;
        }
        .chat-main .message .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            font-size: 10px;
            opacity: 0.5;
        }
        .chat-main .message .recall-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 4px;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .chat-main .message .recall-btn:hover {
            background: var(--bg-hover);
            color: var(--accent);
        }
        .chat-main .message .recalled {
            opacity: 0.6;
            font-style: italic;
        }
        /* ===== 用户详情模态框 ===== */
        .user-profile-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 500;
            animation: fadeIn 0.2s ease;
        }
        .user-profile-modal.active {
            display: flex;
        }
        .user-profile-modal .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 360px;
            width: 90%;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            text-align: center;
        }
        .user-profile-modal .modal-content .avatar-large {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-input);
            margin: 0 auto 12px;
            border: 3px solid var(--accent);
        }
        .user-profile-modal .modal-content .display-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .user-profile-modal .modal-content .email {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .user-profile-modal .modal-content .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }
        .user-profile-modal .modal-content .detail-item:last-child {
            border-bottom: none;
        }
        .user-profile-modal .modal-content .detail-item .label {
            color: var(--text-secondary);
        }
        .user-profile-modal .modal-content .detail-item .value {
            font-weight: 500;
        }
        .user-profile-modal .modal-content .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #4ade80;
            color: #000;
            margin-top: 4px;
        }
        .user-profile-modal .modal-content .status-badge.offline {
            background: var(--text-muted);
            color: #fff;
        }
        .user-profile-modal .modal-close {
            margin-top: 16px;
            background: var(--bg-input);
            border: none;
            padding: 10px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .user-profile-modal .modal-close:hover {
            background: var(--bg-hover);
        }
        /* ===== 设置面板头像上传 ===== */
        .avatar-upload-area {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 6px 0 4px;
        }
        .avatar-upload-area .preview {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            flex-shrink: 0;
        }
        .avatar-upload-area .upload-btn {
            padding: 6px 14px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .avatar-upload-area .upload-btn:hover {
            background: var(--accent-hover);
        }
        .avatar-upload-area input[type="file"] {
            display: none;
        }
        .avatar-upload-status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        /* ===== 输入区域不变 ===== */
        .chat-main .input-area {
            padding: 12px 24px 20px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .chat-main .input-area #attachBtn {
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            color: var(--text-secondary);
        }
        .chat-main .input-area #attachBtn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .chat-main .input-area #attachBtn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .chat-main .input-area input[type="text"] {
            flex: 1;
            padding: 12px 18px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
        }
        .chat-main .input-area input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .chat-main .input-area .send-btn {
            background: var(--accent);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .chat-main .input-area .send-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }
        .chat-main .input-area .send-btn svg {
            width: 24px;
            height: 24px;

        // ==========================================
        // 图片压缩（复用现有）
        // ==========================================
        function compressImage(file, maxWidth, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = height * (maxWidth / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob(function(blob) {
                            if (!blob) {
                                reject(new Error('压缩失败'));
                                return;
                            }
                            const compressed = new File([blob], file.name, {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            });
                            resolve(compressed);
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ==========================================
        // 头像上传
        // ==========================================
        async function uploadAvatar(file) {
            if (!currentUserId) {
                alert('请先登录');
                return;
            }
            if (!file || !file.type.startsWith('image/')) {
                avatarUploadStatus.textContent = '请选择图片文件';
                avatarUploadStatus.style.color = '#f87171';
                return;
            }

            let processedFile = file;
            try {
                if (file.size > 200 * 1024) {
                    processedFile = await compressImage(file, 512, 0.7);
                }
            } catch (err) {
                console.warn('压缩失败，使用原图', err);
            }

            if (processedFile.size > 5 * 1024 * 1024) {
                avatarUploadStatus.textContent = '图片不能超过 5MB';
                avatarUploadStatus.style.color = '#f87171';
                return;
            }

            avatarUploadStatus.textContent = '上传中…';
            avatarUploadStatus.style.color = 'var(--text-secondary)';

            try {
                const fileExt = processedFile.name.split('.').pop();
                const fileName = `avatar_${currentUserId}_${Date.now()}.${fileExt}`;
                const filePath = `public/${fileName}`;

                const { error: uploadError } = await supabase.storage
                    .from('avatars')
                    .upload(filePath, processedFile, { cacheControl: '3600', upsert: true });

                if (uploadError) throw uploadError;

                const { data: urlData } = supabase.storage
                    .from('avatars')
                    .getPublicUrl(filePath);
                const publicURL = urlData.publicUrl;

                const { error: updateError } = await supabase
                    .from('profiles')
                    .update({ avatar_url: publicURL })
                    .eq('id', currentUserId);

                if (updateError) throw updateError;

                currentAvatarUrl = publicURL;
                avatarPreview.src = publicURL;
                avatarUploadStatus.textContent = '✅ 头像已更新';
                avatarUploadStatus.style.color = '#4ade80';

                if (window.chatChannel) {
                    await window.chatChannel.track({
                        user_id: currentUserId,
                        email: currentEmail,
                        display_name: currentDisplayName,
                        avatar_url: publicURL,
                        online_at: new Date().toISOString()
                    });
                }

                refreshMessages();

            } catch (err) {
                console.error('上传头像失败:', err);
                avatarUploadStatus.textContent = '上传失败: ' + (err.message || '请重试');
                avatarUploadStatus.style.color = '#f87171';
            }
        }

        // ==========================================
        // 加载用户信息
        // ==========================================
        async function fetchUserProfiles(emails) {
            if (!emails || emails.length === 0) return {};
            const { data, error } = await supabase
                .from('profiles')
                .select('email, display_name, avatar_url, created_at, last_login')
                .in('email', emails);
            if (error) {
                console.error('获取用户信息失败:', error);
                return {};
            }
            const map = {};
            data.forEach(row => {
                map[row.email] = {
                    display_name: row.display_name,
                    avatar_url: row.avatar_url,
                    created_at: row.created_at,
                    last_login: row.last_login
                };
            });
            return map;
        }

        // ==========================================
        // 用户详情弹窗
        // ==========================================
        function showUserProfile(email) {
            if (!email) return;
            let userInfo = currentUserMap[email] || {};
            if (email === currentEmail) {
                userInfo = {
                    display_name: currentDisplayName,
                    avatar_url: currentAvatarUrl,
                    created_at: userInfo.created_at || '未知',
                    last_login: userInfo.last_login || '未知'
                };
            }
            const onlineUser = Object.values(onlineUsers).find(u => u.email === email);
            if (onlineUser) {
                userInfo.display_name = onlineUser.display_name || userInfo.display_name;
                userInfo.avatar_url = onlineUser.avatar_url || userInfo.avatar_url;
            }

            const displayName = userInfo.display_name || email.split('@')[0];
            const avatarUrl = userInfo.avatar_url || getDefaultAvatar(email);
            const status = onlineUser ? '在线' : '离线';

            profileAvatar.src = avatarUrl;
            profileDisplayName.textContent = displayName;
            profileEmail.textContent = email;
            profileStatus.textContent = status;
            profileStatus.className = 'status-badge' + (status === '在线' ? '' : ' offline');
            profileCreatedAt.textContent = userInfo.created_at ? formatTime(userInfo.created_at) : '未知';
            profileLastLogin.textContent = userInfo.last_login ? formatTime(userInfo.last_login) : '未知';

            profileModal.classList.add('active');
        }

        // ==========================================
        // 创建消息元素（含头像）
        // ==========================================
        function createMessageElement(msg) {
            const { content, sender_name, sender_email, isMe, time, id, created_at, avatar_url } = msg;
            const div = document.createElement('div');
            div.className = 'message ' + (isMe ? 'me' : 'other');
            if (id) div.dataset.messageId = id;
            if (created_at) div.dataset.createdAt = created_at;

            const avatarWrapper = document.createElement('div');
            avatarWrapper.className = 'avatar-wrapper';
            const avatarImg = document.createElement('img');
            avatarImg.src = avatar_url || getDefaultAvatar(sender_email);
            avatarImg.alt = '头像';
            avatarImg.onerror = function() { this.src = getDefaultAvatar(sender_email); };
            avatarWrapper.appendChild(avatarImg);
            avatarWrapper.addEventListener('click', function(e) {
                e.stopPropagation();
                showUserProfile(sender_email);
            });

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            const senderDiv = document.createElement('div');
            senderDiv.className = 'sender';
            const nameSpan = document.createElement('span');
            nameSpan.className = 'name';
            nameSpan.textContent = sender_name || '匿名';
            senderDiv.appendChild(nameSpan);
            if (sender_email && sender_email !== sender_name) {
                const emailSpan = document.createElement('span');
                emailSpan.className = 'email';
                emailSpan.textContent = sender_email;
                senderDiv.appendChild(emailSpan);
            }
            senderDiv.addEventListener('click', function(e) {
                e.stopPropagation();
                showUserProfile(sender_email);
            });
            bubble.appendChild(senderDiv);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            let displayContent = content || '';
            const imageMatch = displayContent.match(/!\[image\]\((.*?)\)/);
            if (imageMatch) {
                const url = imageMatch[1];
                displayContent =
                    `<img src="${url}" onclick="window.previewImage && window.previewImage('${url}')" alt="图片" loading="lazy" />`;
            } else {
                displayContent = displayContent.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }
            contentDiv.innerHTML = displayContent;
            bubble.appendChild(contentDiv);

            const footer = document.createElement('div');
            footer.className = 'message-footer';
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.textContent = time || formatTimeShort(new Date().toISOString());
            footer.appendChild(timeSpan);

            const isRecalled = content === '（已撤回）';
            if (isMe && created_at && !isRecalled) {
                const msgTime = new Date(created_at).getTime();
                const diffMinutes = (Date.now() - msgTime) / 1000 / 60;
                if (diffMinutes < 2) {
                    const recallBtn = document.createElement('button');
                    recallBtn.className = 'recall-btn';
                    recallBtn.dataset.messageId = id;
                    recallBtn.textContent = '撤回';
                    recallBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        window.recallMessage(id);
                    });
                    recallBtn.addEventListener('touchstart', function(e) {
                        e.stopPropagation();
                        window.recallMessage(id);
                    }, { passive: false });
                    footer.appendChild(recallBtn);
                }
            }
            bubble.appendChild(footer);

            div.appendChild(avatarWrapper);
            div.appendChild(bubble);
            return div;
        }

        function addMessageToBottom(msg) {
            const div = createMessageElement(msg);
            messageList.appendChild(div);
            messageList.scrollTop = messageList.scrollHeight;
        }

        function prependMessages(messages) {
            const fragment = document.createDocumentFragment();
            messages.forEach(msg => {
                const div = createMessageElement(msg);
                fragment.appendChild(div);
            });
            const firstChild = messageList.firstChild;
            if (firstChild) {
                messageList.insertBefore(fragment, firstChild);
            } else {
                messageList.appendChild(fragment);
            }
        }

        // ==========================================
        // 加载历史消息（含头像）
        // ==========================================
        async function loadHistory(append = false) {
            if (isLoadingMore || !hasMoreMessages) return;
            isLoadingMore = true;

            try {
                let query = supabase
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(PAGE_SIZE);

                if (oldestTimestamp) {
                    query = query.lt('created_at', oldestTimestamp);
                }

                const { data, error } = await query;
                if (error) throw error;

                if (!data || data.length === 0) {
                    hasMoreMessages = false;
                    isLoadingMore = false;
                    return;
                }

                const sorted = data.reverse();
                const earliest = sorted[0];
                oldestTimestamp = earliest.created_at;

                const emails = [...new Set(sorted.map(m => m.sender_email).filter(Boolean))];
                let userMap = {};
                if (emails.length > 0) {
                    userMap = await fetchUserProfiles(emails);
                }
                Object.assign(currentUserMap, userMap);

                const messages = sorted.map(msg => {
                    const isMe = (msg.sender_email === currentEmail);
                    const userInfo = userMap[msg.sender_email] || {};
                    const avatar_url = userInfo.avatar_url || getDefaultAvatar(msg.sender_email);
                    return {
                        id: msg.id,
                        content: msg.content,
                        sender_name: msg.sender_name || userInfo.display_name || '匿名',
                        sender_email: msg.sender_email,
                        isMe: isMe,
                        time: formatTimeShort(msg.created_at),
                        created_at: msg.created_at,
                        avatar_url: avatar_url
                    };
                });

                if (!append) {
                    messageList.innerHTML = '';
                    messages.forEach(msg => addMessageToBottom(msg));
                    cacheMessages(sorted);
                } else {
                    prependMessages(messages);
                }

                if (data.length < PAGE_SIZE) {
                    hasMoreMessages = false;
                }
                isLoadingMore = false;
            } catch (err) {
                console.error('加载历史消息失败:', err);
                isLoadingMore = false;
            }
        }

        // ==========================================
        // 缓存管理
        // ==========================================
        function cacheMessages(messages) {
            try {
                localStorage.setItem('minichat_messages', JSON.stringify(messages));
            } catch (e) { /* ignore */ }
        }

        function getCachedMessages() {
            try {
                const data = localStorage.getItem('minichat_messages');
                return data ? JSON.parse(data) : null;
            } catch (e) { return null; }
        }

        async function refreshMessages() {
            messageList.innerHTML = '';
            hasMoreMessages = true;
            oldestTimestamp = null;
            await loadHistory(false);
        }

        // ==========================================
        // 认证逻辑
        // ==========================================
        function switchMode(mode) {
            isLoginMode = (mode === 'login');
            if (isLoginMode) {
                authTitle.textContent = '欢迎回来';
                authSub.textContent = '登录你的账户';
                btnLogin.textContent = '登录';
                switchToSignup.textContent = '注册';
                switchToSignup.parentElement.innerHTML = '还没有账户？<a id="switchToSignup">注册</a>';
                document.getElementById('switchToSignup').addEventListener('click', () => switchMode('signup'));
            } else {
                authTitle.textContent = '创建账户';
                authSub.textContent = '使用邮箱和密码注册';
                btnLogin.textContent = '注册';
                switchToSignup.textContent = '登录';
                switchToSignup.parentElement.innerHTML = '已有账户？<a id="switchToSignup">登录</a>';
                document.getElementById('switchToSignup').addEventListener('click', () => switchMode('login'));
            }
            setAuthMessage('');
        }

        async function handleAuth() {
            const email = authEmail.value.trim();
            const password = authPassword.value.trim();
            if (!email || !password) {
                setAuthMessage('请填写邮箱和密码', 'error');
                return;
            }
            if (password.length < 6) {
                setAuthMessage('密码至少6位', 'error');
                return;
            }
            setLoading(true);
            setAuthMessage('处理中…', '');

            try {
                let result;
                if (isLoginMode) {
                    result = await supabase.auth.signInWithPassword({ email, password });
                } else {
                    result = await supabase.auth.signUp({ email, password });
                }

                if (result.error) {
                    if (result.error.message.includes('Email not confirmed')) {
                        setAuthMessage('请先验证邮箱后再登录', 'error');
                    } else {
                        setAuthMessage(result.error.message, 'error');
                    }
                    setLoading(false);
                    return;
                }

                const user = result.data.user;
                if (!user) {
                    setAuthMessage('未获取到用户信息', 'error');
                    setLoading(false);
                    return;
                }

                currentEmail = user.email;
                currentUserId = user.id;

                await ensureProfile(user.id, user.email);

                if (isLoginMode) {
                    setAuthMessage('登录成功', 'success');
                    setLoading(false);
                    enterChat();
                } else {
                    setAuthMessage('注册成功！请查收邮件并点击确认链接后登录。', 'success');
                    setLoading(false);
                }

            } catch (err) {
                console.error(err);
                setAuthMessage('网络错误，请重试', 'error');
                setLoading(false);
            }
        }

        async function ensureProfile(userId, email) {
            const { data, error } = await supabase
                .from('profiles')
                .select('id')
                .eq('id', userId)
                .maybeSingle();
            if (error && error.code !== 'PGRST116') {
                console.error('查询 profiles 失败:', error);
                return;
            }
            if (!data) {
                const defaultName = email.split('@')[0];
                const { error: insertError } = await supabase
                    .from('profiles')
                    .insert({
                        id: userId,
                        email: email,
                        last_login: new Date().toISOString(),
                        display_name: defaultName,
                        avatar_url: getDefaultAvatar(email)
                    });
                if (insertError) {
                    console.error('插入 profiles 失败:', insertError);
                }
            } else {
                const { error: updateError } = await supabase
                    .from('profiles')
                    .update({ last_login: new Date().toISOString() })
                    .eq('id', userId);
                if (updateError) console.error('更新 last_login 失败:', updateError);
            }
        }

        function setLoading(loading) {
            btnLogin.disabled = loading;
            btnLogin.style.opacity = loading ? '0.6' : '1';
        }

                    .from('profiles')

                    .eq('id', currentUserId)

                    displayNameInput.value = fallback;
                    sidebarUserEmail.textContent = fallback;
                    avatarPreview.src = currentAvatarUrl;
                }
            } catch (err) {
                console.error('加载用户信息失败:', err);

                currentDisplayName = fallback;
                currentAvatarUrl = getDefaultAvatar(currentEmail);
                displayNameInput.value = fallback;
                sidebarUserEmail.textContent = fallback;

        async function saveDisplayName() {
            const newName = displayNameInput.value.trim();
            if (!newName) {
                displayNameMessage.textContent = '昵称不能为空';
                displayNameMessage.style.color = '#f87171';
                return;
            }
            if (newName.length > 20) {
                displayNameMessage.textContent = '昵称不能超过20个字符';
                displayNameMessage.style.color = '#f87171';
                return;
            }

            displayNameMessage.textContent = '保存中…';
            displayNameMessage.style.color = 'var(--text-secondary)';

            try {
                const { error } = await supabase
                    .from('profiles')
                    .update({ display_name: newName })
                    .eq('id', currentUserId);
                if (error) {
                    if (error.message && error.message.includes('duplicate key')) {
                        displayNameMessage.textContent = '❌ 昵称已被占用，请换一个';
                        displayNameMessage.style.color = '#f87171';
                    } else {
                        throw error;
                    }
                    return;
                }

                const { error: updateMsgError } = await supabase
                    .from('messages')
                    .update({ sender_name: newName })
                    .eq('sender_email', currentEmail);

                if (updateMsgError) {
                    console.warn('更新历史消息失败:', updateMsgError);
                    displayNameMessage.textContent = '⚠️ 昵称已修改，但历史消息未同步';
                    displayNameMessage.style.color = '#fbbf24';
                } else {
                    displayNameMessage.textContent = '✅ 昵称已更新（历史消息已同步）';
                    displayNameMessage.style.color = '#4ade80';
                }

                currentDisplayName = newName;
                sidebarUserEmail.textContent = newName;

                if (window.chatChannel) {
                    await window.chatChannel.track({
                        user_id: currentUserId,
                        email: currentEmail,
                        display_name: currentDisplayName,
                        avatar_url: currentAvatarUrl,
                        online_at: new Date().toISOString()
                    });
                }

                refreshMessages();

            } catch (err) {
                console.error('保存昵称失败:', err);
                displayNameMessage.textContent = '保存失败，请重试';
                displayNameMessage.style.color = '#f87171';
            }
        }

        // ==========================================
        // 进入聊天
        // ==========================================
        function enterChat() {
            loginOverlay.classList.add('hidden');
            mainInterface.classList.remove('hidden');
            sidebarUserEmail.textContent = currentEmail;

            hasMoreMessages = true;
            oldestTimestamp = null;
            isLoadingMore = false;
            unreadCount = 0;
            document.title = 'MiniChat';

            loadDisplayName().then(() => {
                refreshMessages();
            });

            const cached = getCachedMessages();
            if (cached && cached.length > 0) {
                messageList.innerHTML = '';
                // 需要从缓存中提取头像信息，但缓存可能没有头像，所以调用 loadHistory 重新加载
                // 直接重新加载，用最新数据
                loadHistory(false);
            } else {
                messageList.innerHTML = '';
                loadHistory(false);
            }

            localStorage.setItem('minichat_user', JSON.stringify({ email: currentEmail, id: currentUserId }));
            loadTheme();

            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }

            subscribeMessages();
            messageList.addEventListener('scroll', handleScroll);

            // 移动端撤回事件委托
            messageList.addEventListener('click', function(e) {
                const btn = e.target.closest('.recall-btn');
                if (btn) {
                    e.preventDefault();
                    const messageId = btn.dataset.messageId;
                    if (messageId) window.recallMessage(messageId);
                }

            messageList.addEventListener('touchstart', function(e) {

                if (btn) {
                    e.preventDefault();
                    const messageId = btn.dataset.messageId;
                    if (messageId) window.recallMessage(messageId);
                }
            }, { passive: false });
        }

        // ==========================================
        // 发送消息
        // ==========================================
        async function sendMessageContent(content) {
            if (!currentEmail) {
                alert('请先登录');
                return;
            }

            const senderName = currentDisplayName || currentEmail.split('@')[0];

            // 乐观创建消息对象
            const tempMsg = {
                id: 'temp-' + Date.now(),
                content: content,
                sender_name: senderName,
                sender_email: currentEmail,
                isMe: true,
                time: formatTimeShort(new Date().toISOString()),
                created_at: new Date().toISOString(),
                avatar_url: currentAvatarUrl || getDefaultAvatar(currentEmail)
            };
            addMessageToBottom(tempMsg);

            try {
                const { data, error } = await supabase
                    .from('messages')
                    .insert({
                        content: content,
                        sender_name: senderName,
                        sender_email: currentEmail
                    })
                    .select()
                    .single();

                if (error) throw error;

                // 用真实数据替换
                if (data) {
                    const realMsg = {
                        id: data.id,
                        content: data.content,
                        sender_name: data.sender_name || senderName,
                        sender_email: data.sender_email || currentEmail,
                        isMe: true,
                        time: formatTimeShort(data.created_at),
                        created_at: data.created_at,
                        avatar_url: currentAvatarUrl || getDefaultAvatar(currentEmail)
                    };
                    // 移除临时消息并添加真实消息
                    const tempEl = messageList.querySelector(`[data-message-id="${tempMsg.id}"]`);
                    if (tempEl) {
                        tempEl.replaceWith(createMessageElement(realMsg));
                    } else {
                        // 如果临时消息已被移除，直接添加
                        addMessageToBottom(realMsg);
                    }
                }

                if (chatInput.value) chatInput.value = '';

            } catch (err) {
                console.error('发送失败:', err);
                const tempEl = messageList.querySelector(`[data-message-id="${tempMsg.id}"]`);
                if (tempEl) tempEl.remove();
                setAuthMessage('消息发送失败，请重试', 'error');
                setTimeout(() => {
                    if (authMessage.textContent === '消息发送失败，请重试') authMessage.textContent = '';
                }, 3000);
            }
        }

        // ==========================================
        // 消息撤回
        // ==========================================
        window.recallMessage = async function(messageId) {
            if (!messageId) return;
            if (!confirm('确定要撤回这条消息吗？')) return;

            try {
                const { error } = await supabase
                    .from('messages')
                    .update({ content: '（已撤回）' })
                    .eq('id', messageId)
                    .eq('sender_email', currentEmail);

                if (error) {
                    console.error('撤回失败:', error);
                    setAuthMessage('撤回失败，请重试', 'error');
                    setTimeout(() => {
                        if (authMessage.textContent === '撤回失败，请重试') authMessage.textContent = '';
                    }, 3000);
                }
            } catch (err) {
                console.error('撤回失败:', err);
            }
        };

        // ==========================================
        // 订阅消息 + Presence
        // ==========================================
        function subscribeMessages() {
            if (window.chatChannel) {
                window.chatChannel.unsubscribe();
                window.chatChannel = null;
            }

            const channel = supabase.channel('chat-room', {
                config: {
                    presence: {
                        key: currentUserId
                    }
                }
            });

            channel.on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                const users = {};
                let count = 0;
                for (const [key, presences] of Object.entries(state)) {
                    const presence = presences[0];
                    if (presence) {
                        users[key] = {
                            user_id: key,
                            display_name: presence.display_name || '匿名',
                            email: presence.email || '',
                            avatar_url: presence.avatar_url || getDefaultAvatar(presence.email)
                        };
                        count++;
                    }
                }
                onlineUsers = users;
                onlineCount = count;
                updateOnlineUI();
            });

            channel.on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'messages'
            }, (payload) => {
                try {
                    const msg = payload.new;
                    if (!msg) return;
                    const isMe = (msg.sender_email === currentEmail);
                    if (isMe) return;
                    // 获取发送者头像
                    const email = msg.sender_email;
                    let avatar_url = currentUserMap[email]?.avatar_url || getDefaultAvatar(email);
                    // 从在线用户中获取头像
                    const onlineUser = Object.values(onlineUsers).find(u => u.email === email);
                    if (onlineUser && onlineUser.avatar_url) {
                        avatar_url = onlineUser.avatar_url;
                    }
                    const newMsg = {
                        id: msg.id,
                        content: msg.content,
                        sender_name: msg.sender_name || '匿名',
                        sender_email: email,
                        isMe: false,
                        time: formatTimeShort(msg.created_at),
                        created_at: msg.created_at,
                        avatar_url: avatar_url
                    };
                    addMessageToBottom(newMsg);

                    if (document.hidden) {
                        unreadCount++;
                        document.title = `(${unreadCount}) MiniChat`;
                        if ('Notification' in window && Notification.permission === 'granted') {
                            const notification = new Notification('新消息', {
                                body: `${msg.sender_name}: ${msg.content}`,
                                icon: 'assets/logo.svg'
                            });
                            setTimeout(() => notification.close(), 5000);
                        }
                    }
                } catch (e) {
                    console.error('处理新消息失败:', e);
                }
            });

            channel.on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'messages'
            }, (payload) => {
                try {
                    const updated = payload.new;
                    const elements = document.querySelectorAll(`.message[data-message-id="${updated.id}"]`);
                    elements.forEach(el => {
                        const contentDiv = el.querySelector('.message-content');
                        if (contentDiv) {
                            if (updated.content === '（已撤回）') {
                                contentDiv.textContent = '（已撤回）';
                                contentDiv.className = 'message-content recalled';
                            } else {
                                contentDiv.innerHTML = updated.content.replace(/</g, '&lt;').replace(
                                    />/g, '&gt;');
                                contentDiv.className = 'message-content';
                            }
                        }
                        const footer = el.querySelector('.message-footer');
                        if (footer && updated.content === '（已撤回）') {
                            const recallBtn = footer.querySelector('.recall-btn');
                            if (recallBtn) recallBtn.remove();
                        }
                    });
                } catch (e) {
                    console.error('处理消息更新失败:', e);
                }
            });

            channel.subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await channel.track({
                        user_id: currentUserId,
                        email: currentEmail,
                        display_name: currentDisplayName || currentEmail.split('@')[0],
                        avatar_url: currentAvatarUrl || getDefaultAvatar(currentEmail),
                        online_at: new Date().toISOString()
                    });
                }
            });

            window.chatChannel = channel;
        }

        // ==========================================
        // 图片预览（全局）
        // ==========================================
        window.previewImage = function(url) {
            const overlay = document.createElement('div');
            overlay.style.cssText =
                'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:20px;';
            const img = document.createElement('img');
            img.src = url;
            img.style.cssText =
                'max-width:100%;max-height:70%;object-fit:contain;border-radius:12px;margin-bottom:24px;box-shadow:0 10px 30px rgba(0,0,0,0.5);';
            const btnContainer = document.createElement('div');
            btnContainer.style.cssText = 'display:flex;gap:16px;flex-wrap:wrap;justify-content:center;';
            const downloadBtn = document.createElement('button');
            downloadBtn.textContent = '下载图片';
            downloadBtn.style.cssText =
                'padding:12px 28px;border:none;border-radius:10px;background:#3b82f6;color:#fff;font-size:15px;font-weight:500;cursor:pointer;';
            downloadBtn.onclick = function(e) {
                e.stopPropagation();
                downloadBtn.textContent = '下载中…';
                downloadBtn.disabled = true;
                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error('下载失败');
                        return res.blob();
                    })
                    .then(blob => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        const filename = url.split('/').pop().split('?')[0] || 'image.jpg';
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        URL.revokeObjectURL(a.href);
                        downloadBtn.textContent = '已下载';
                        setTimeout(() => {
                            downloadBtn.textContent = '下载图片';
                            downloadBtn.disabled = false;
                        }, 2000);
                    })
                    .catch(err => {
                        console.error('下载失败:', err);
                        downloadBtn.textContent = '下载失败';
                        setTimeout(() => {
                            downloadBtn.textContent = '下载图片';
                            downloadBtn.disabled = false;
                        }, 2000);
                    });
            };
            const closeBtn = document.createElement('button');
            closeBtn.textContent = '关闭';
            closeBtn.style.cssText =
                'padding:12px 28px;border:none;border-radius:10px;background:rgba(255,255,255,0.15);color:#fff;font-size:15px;font-weight:500;cursor:pointer;';
            closeBtn.onclick = function(e) {
                e.stopPropagation();
                document.body.removeChild(overlay);
            };
            btnContainer.appendChild(downloadBtn);
            btnContainer.appendChild(closeBtn);
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    document.body.removeChild(overlay);
                }
            });
            overlay.appendChild(img);
            overlay.appendChild(btnContainer);
            document.body.appendChild(overlay);
        };

        // ==========================================
        // 图片上传（聊天图片）
        // ==========================================
        attachBtn.addEventListener('click', function(e) {
            e.preventDefault();
            fileInput.click();
        });

        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                setAuthMessage('请选择图片文件', 'error');
                fileInput.value = '';
                return;
            }

            let processedFile = file;
            try {
                if (file.size > 200 * 1024) {
                    processedFile = await compressImage(file, 1080, 0.7);
                }
            } catch (err) {
                console.warn('压缩失败，使用原图', err);
                processedFile = file;
            }

            if (processedFile.size > 20 * 1024 * 1024) {
                setAuthMessage('图片不能超过 20MB', 'error');
                fileInput.value = '';
                return;
            }

            const tempId = 'uploading_' + Date.now();
            const tempDiv = document.createElement('div');
            tempDiv.className = 'message me';
            tempDiv.innerHTML =
                '<div class="avatar-wrapper"><img src="" alt="头像" style="width:28px;height:28px;border-radius:50%;" /></div><div class="bubble"><span style="opacity:0.6;">上传中…</span></div>';
            const avatarImg = tempDiv.querySelector('.avatar-wrapper img');
            avatarImg.src = currentAvatarUrl || getDefaultAvatar(currentEmail);
            messageList.appendChild(tempDiv);
            messageList.scrollTop = messageList.scrollHeight;

            try {
                const fileExt = processedFile.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.${fileExt}`;
                const filePath = `public/${fileName}`;
                const { data, error } = await supabase.storage
                    .from('chat-images')
                    .upload(filePath, processedFile, { cacheControl: '3600', upsert: false });
                if (error) throw error;
                const { data: urlData } = supabase.storage
                    .from('chat-images')
                    .getPublicUrl(filePath);
                const publicURL = urlData.publicUrl;
                const content = `![image](${publicURL})`;
                await sendMessageContent(content);
                tempDiv.remove();
            } catch (err) {
                console.error('上传失败:', err);
                tempDiv.remove();
                setAuthMessage('图片上传失败，请重试', 'error');
                setTimeout(() => {
                    if (authMessage.textContent === '图片上传失败，请重试') authMessage.textContent = '';
                }, 3000);
            } finally {
                fileInput.value = '';
            }
        });

        // ==========================================
        // 事件绑定
        // ==========================================
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                unreadCount = 0;
                document.title = 'MiniChat';
            }
        });

        btnLogin.addEventListener('click', handleAuth);
        document.getElementById('switchToSignup').addEventListener('click', () => switchMode('signup'));
        togglePwd.addEventListener('click', function() {
            const type = authPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            authPassword.setAttribute('type', type);
            this.textContent = type === 'password' ? '显示' : '隐藏';
        });

        if (chatInput) {
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    const content = this.value.trim();
                    if (content) sendMessageContent(content);
                }
            });
        }
        btnSend.addEventListener('click', function() {
            const content = chatInput.value.trim();
            if (content) sendMessageContent(content);
        });

        if (settingsNav) settingsNav.addEventListener('click', openSettings);
        if (closeSettings) closeSettings.addEventListener('click', closeSettingsPanel);
        if (settingsOverlay) {
            settingsOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeSettingsPanel();
            });
        }
        if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
        if (settingsLogout) settingsLogout.addEventListener('click', handleLogout);

        saveDisplayNameBtn.addEventListener('click', saveDisplayName);
        displayNameInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                saveDisplayName();
            }
        });

        // 头像上传按钮
        avatarUploadBtn.addEventListener('click', function() {
            avatarFileInput.click();
        });
        avatarFileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                uploadAvatar(e.target.files[0]);
            }
            this.value = '';
        });

        // 在线用户弹窗
        onlineUsersBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            onlineModal.classList.toggle('active');
        });
        closeOnlineModal.addEventListener('click', function() {
            onlineModal.classList.remove('active');
        });
        document.addEventListener('click', function(e) {
            if (onlineModal.classList.contains('active') &&
                !onlineModal.contains(e.target) &&
                !onlineUsersBtn.contains(e.target)) {
                onlineModal.classList.remove('active');
            }
        });

        // 用户详情弹窗关闭
        closeProfileModal.addEventListener('click', function() {
            profileModal.classList.remove('active');
        });
        profileModal.addEventListener('click', function(e) {
            if (e.target === this) {
                profileModal.classList.remove('active');
            }
        });

        // ==========================================
        // Splash 控制
        // ==========================================
        (function() {
            const SPLASH_DURATION = 1800;
            const splash = document.getElementById('splash');
            const fill = document.getElementById('splashFill');

            function hideSplash() {
                if (!splash) return;
                splash.classList.add('hidden');
                setTimeout(() => {
                    if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
                }, 420);

                loginOverlay.classList.remove('hidden');

                const raw = localStorage.getItem('minichat_user');
                if (raw) {
                    try {
                        const u = JSON.parse(raw);
                        if (u && u.email) {
                            currentEmail = u.email;
                            currentUserId = u.id || '';
                            supabase.auth.getSession().then(({ data, error }) => {
                                if (data.session) {
                                    enterChat();
                                }
                            }).catch(() => {});
                            return;
                        }
                    } catch (e) { /* ignore */ }
                }
            }

            document.addEventListener('DOMContentLoaded', function() {
                if (fill) {
                    fill.style.width = '0%';
                    void fill.offsetWidth;
                    fill.style.transition = 'width ' + SPLASH_DURATION + 'ms linear';
                    fill.style.width = '100%';
                }
                setTimeout(hideSplash, SPLASH_DURATION + 120);
            });
        })();

        loadTheme();
        console.log('✅ MiniChat 已升级：用户头像 + 详细信息弹窗');
    </script>
</body>
</html>
