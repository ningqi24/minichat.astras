<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MiniChat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0d0d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-sidebar: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2a2a2a;
            --bg-hover: #2a2a2a;
            --bg-overlay: rgba(0,0,0,0.7);
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #2a2a2a;
            --shadow: 0 8px 30px rgba(0,0,0,0.6);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
            --avatar-size: 28px;
            --mention-color: #fbbf24;
            --quote-bg: rgba(59,130,246,0.1);
            --quote-border: #3b82f6;
            --quote-author: #60a5fa;
            --code-bg: rgba(255,255,255,0.1);
            --code-border: rgba(128,128,128,0.2);
            --link-color: #60a5fa;
            /* 【修改】自己消息气泡 - 和对方同色调但加深 */
            --bubble-me: #0f0f0f;
            --bubble-me-border: #1a1a1a;
        }
        body.light-theme {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-sidebar: #f7f8fa;
            --bg-card: #ffffff;
            --bg-input: #eef0f2;
            --bg-hover: #e8eaed;
            --bg-overlay: rgba(255,255,255,0.7);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #d0d5dd;
            --shadow: 0 8px 30px rgba(0,0,0,0.08);
            --quote-bg: rgba(59,130,246,0.06);
            --quote-border: #3b82f6;
            --quote-author: #2563eb;
            --code-bg: rgba(0,0,0,0.06);
            --code-border: rgba(0,0,0,0.1);
            --link-color: #2563eb;
            --bubble-me: #dfe3e8;
            --bubble-me-border: #c8cdd4;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 16px; transition: background 0.3s, color 0.3s;
        }
        .app {
            width: 100%; max-width: 1300px; height: 96vh; max-height: 900px;
            background: var(--bg-secondary); border-radius: var(--radius);
            box-shadow: var(--shadow); display: flex; overflow: hidden; position: relative;
        }
        .splash {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 8px;
            background: #000; z-index: 400; transition: opacity 0.35s, visibility 0.35s;
        }
        .splash.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .splash-inner { display:flex; align-items:center; gap:10px; }
        .splash-inner .splash-icon { height:240px; width:240px; object-fit:contain; filter: drop-shadow(0 4px 12px rgba(59,130,246,0.3)); }
        .splash-divider { width:2px; height:80px; background:rgba(255,255,255,0.6); flex-shrink:0; }
        .splash-bar { width:320px; max-width:calc(100% - 80px); height:6px; border-radius:6px; background:rgba(255,255,255,0.08); overflow:hidden; box-shadow:0 6px 18px rgba(0,0,0,0.5); margin-top:4px; }
        .splash-bar .fill { height:100%; width:0%; background:#3b82f6; border-radius:6px; animation: splashFill 1.8s linear 1 forwards; }
        @keyframes splashFill { from{width:0%} to{width:100%} }
        .login-overlay {
            position:absolute; inset:0; background:var(--bg-overlay); backdrop-filter:blur(12px);
            display:flex; justify-content:center; align-items:center; z-index:200;
            border-radius:var(--radius); transition: opacity 0.3s, visibility 0.3s;
        }
        .login-overlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .login-card {
            background:var(--bg-card); padding:40px 36px; border-radius:var(--radius);
            width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.8); border:1px solid var(--border-color);
        }
        .login-card .logo-area { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
        .login-card .logo-area img { height:40px; width:auto; }
        .login-card .logo-area h1 { display:none; }
        .login-card .auth-title { font-size:20px; font-weight:500; margin-bottom:6px; }
        .login-card .auth-sub { font-size:14px; color:var(--text-secondary); margin-bottom:24px; }
        .login-card input { width:100%; padding:14px 18px; border-radius:var(--radius-sm); border:1px solid var(--border-color); background:var(--bg-input); color:var(--text-primary); font-size:15px; outline:none; transition:var(--transition); margin-bottom:14px; }
        .login-card input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,0.2); }
        .login-card .btn-primary { width:100%; padding:14px; background:var(--accent); border:none; border-radius:var(--radius-sm); color:#fff; font-weight:600; font-size:15px; cursor:pointer; transition:var(--transition); margin-top:6px; }
        .login-card .btn-primary:hover { background:var(--accent-hover); box-shadow:0 4px 14px rgba(59,130,246,0.3); }
        .login-card .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
        .login-card .auth-message { font-size:13px; text-align:center; margin-top:16px; min-height:20px; }
        .login-card .auth-message.success { color:#4ade80; }
        .login-card .auth-message.error { color:#f87171; }
        .login-card .auth-toggle { display:flex; justify-content:center; gap:20px; margin-top:14px; font-size:14px; }
        .login-card .auth-toggle a { color:var(--accent); cursor:pointer; text-decoration:none; }
        .login-card .auth-toggle a:hover { text-decoration:underline; }
        .login-card .pwd-wrapper { position:relative; }
        .login-card .pwd-wrapper .toggle-pwd { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:14px; }
        .sidebar .logo-area .logo-text { font-size:18px; font-weight:700; color:var(--text-primary); margin-left:4px; }
        @media(max-width:480px) { .sidebar .logo-area .logo-text { display:none; } }
        .main-interface { display:flex; width:100%; height:100%; }
        .main-interface.hidden { display:none; }
        .sidebar { width:280px; flex-shrink:0; background:var(--bg-sidebar); border-right:1px solid var(--border-color); display:flex; flex-direction:column; padding:20px 16px; }
        .sidebar .logo-area { display:flex; align-items:center; padding-bottom:20px; border-bottom:1px solid var(--border-color); margin-bottom:20px; }
        .sidebar .logo-area img { height:36px; max-width:100%; object-fit:contain; }
        .sidebar .nav { flex:1; }
        .sidebar .nav-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:var(--radius-sm); color:var(--text-secondary); cursor:pointer; transition:var(--transition); margin-bottom:4px; font-weight:500; }
        .sidebar .nav-item:hover { background:var(--bg-hover); color:var(--text-primary); }
        .sidebar .nav-item.active { background:var(--bg-hover); color:var(--text-primary); }
        .sidebar .nav-item svg { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .sidebar .user-section { border-top:1px solid var(--border-color); padding-top:16px; margin-top:auto; }
        .sidebar .user-email { font-size:13px; color:var(--text-secondary); padding:8px 0; word-break:break-all; }
        .sidebar .version-tag { font-size:11px; color:var(--text-muted); padding:4px 0; }
        .chat-main { flex:1; min-width:0; display:flex; flex-direction:column; background:var(--bg-secondary); }
        .chat-main .chat-header { padding:16px 24px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
        .chat-main .chat-header .chat-title { font-size:18px; font-weight:600; }
        .chat-main .chat-header .chat-title small { font-size:13px; font-weight:400; color:var(--text-secondary); margin-left:10px; }
        .chat-header-right { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text-secondary); }
        .online-users-btn { background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:13px; display:flex; align-items:center; gap:4px; padding:4px 8px; border-radius:6px; transition:background 0.2s; position:relative; }
        .online-users-btn:hover { background:var(--bg-hover); }
        .online-users-btn svg { width:18px; height:18px; stroke:currentColor; stroke-width:2; fill:none; }
        .online-badge { background:var(--accent); color:#fff; border-radius:50%; padding:0 5px; font-size:10px; min-width:16px; height:16px; line-height:16px; text-align:center; display:none; }
        .online-badge.show { display:inline-block; }
        .online-modal { display:none; position:absolute; top:60px; right:20px; background:var(--bg-card); border-radius:var(--radius-sm); border:1px solid var(--border-color); box-shadow:var(--shadow); padding:16px; min-width:200px; max-width:280px; max-height:300px; overflow-y:auto; z-index:250; }
        .online-modal.active { display:block; }
        .online-modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-size:14px; font-weight:600; }
        .online-modal-close { background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:18px; line-height:1; }
        .online-user-list { display:flex; flex-direction:column; gap:6px; }
        .online-user-item { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; border-bottom:1px solid var(--border-color); }
        .online-user-item:last-child { border-bottom:none; }
        .online-user-item .avatar-small { width:20px; height:20px; border-radius:50%; object-fit:cover; background:var(--bg-input); flex-shrink:0; }
        .online-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#4ade80; flex-shrink:0; }
        .online-user-name { font-weight:500; }
        .online-empty { color:var(--text-muted); font-size:13px; text-align:center; padding:12px 0; }
        .chat-main .chat-messages { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:10px; background:var(--bg-primary); }
        .chat-main .chat-messages::-webkit-scrollbar { width:4px; }
        .chat-main .chat-messages::-webkit-scrollbar-thumb { background:#3a3a3a; border-radius:10px; }
        .chat-main .message { display:flex; align-items:flex-start; gap:8px; max-width:85%; animation:fadeIn 0.2s ease; position:relative; }
        .chat-main .message.me { align-self:flex-end; flex-direction:row-reverse; }
        .chat-main .message.other { align-self:flex-start; }
        .chat-main .message .avatar-wrapper { flex-shrink:0; cursor:pointer; }
        .chat-main .message .avatar-wrapper img { width:var(--avatar-size); height:var(--avatar-size); border-radius:50%; object-fit:cover; background:var(--bg-input); border:2px solid transparent; transition:border-color 0.2s; }
        .chat-main .message.me .avatar-wrapper img { border-color: var(--text-muted); }
        .chat-main .message .bubble { padding:10px 16px; border-radius:18px; word-wrap:break-word; overflow-wrap:break-word; line-height:1.6; font-size:14px; box-shadow:0 1px 2px rgba(0,0,0,0.1); flex:1; min-width:0; position:relative; }
        .chat-main .message.other .bubble { background:var(--bg-card); color:var(--text-primary); border-bottom-left-radius:4px; border:1px solid var(--border-color); }
        /* 【修改】自己消息气泡 - 同色调加深 */
        .chat-main .message.me .bubble { background:var(--bubble-me); color:var(--text-primary); border-bottom-right-radius:4px; border:1px solid var(--bubble-me-border); }
        .chat-main .message .sender { font-size:13px; font-weight:600; margin-bottom:2px; display:flex; align-items:center; gap:6px; cursor:pointer; }
        .chat-main .message .sender .name { color:var(--text-primary); }
        .chat-main .message .sender .email { font-size:10px; font-weight:400; opacity:0.5; }
        .chat-main .message .message-content { margin-bottom:4px; word-wrap:break-word; overflow-wrap:break-word; line-height:1.75; }
        .chat-main .message .message-content .quote-block { border-left:3px solid var(--quote-border); padding:8px 14px; margin:8px 0; background:var(--quote-bg); border-radius:0 10px 10px 0; font-size:13px; color:var(--text-secondary); line-height:1.6; }
        .chat-main .message.me .message-content .quote-block { border-left-color: var(--quote-border); background:var(--quote-bg); }
        .chat-main .message .message-content .quote-block .quote-author { font-weight:700; color:var(--quote-author); margin-right:6px; }
        .chat-main .message .message-content .quote-block .quote-time { font-size:11px; opacity:0.55; display:block; margin-top:3px; }
        .chat-main .message .message-content strong { font-weight:700; }
        .chat-main .message .message-content em { font-style:italic; }
        .chat-main .message .message-content code { background:var(--code-bg); padding:1px 7px; border-radius:5px; font-family:'SF Mono','Fira Code','Consolas',monospace; font-size:0.88em; border:1px solid var(--code-border); }
        .chat-main .message .message-content a.rt-link { color:var(--link-color); text-decoration:underline; text-underline-offset:2px; text-decoration-thickness:1px; }
        .chat-main .message .message-content .mention { color:var(--mention-color); font-weight:600; background:rgba(251,191,36,0.15); padding:0 4px; border-radius:3px; }
        .chat-main .message .message-content img.msg-img { max-width:240px; max-height:240px; border-radius:10px; display:block; margin:8px 0 4px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.2); transition:transform 0.2s; }
        .chat-main .message .message-content img.msg-img:hover { transform:scale(1.02); }
        .chat-main .message .message-content audio { width:100%; max-width:280px; display:block; margin:8px 0 4px; border-radius:8px; }
        .chat-main .message .message-footer { display:flex; align-items:center; justify-content:flex-end; gap:6px; font-size:10px; opacity:0.7; flex-wrap:wrap; margin-top:2px; }
        .chat-main .message .message-footer .action-btn { background:rgba(128,128,128,0.15); border:1px solid rgba(128,128,128,0.1); color:var(--text-secondary); cursor:pointer; padding:2px 6px; border-radius:4px; transition:all 0.2s; touch-action:manipulation; display:flex; align-items:center; justify-content:center; font-size:11px; gap:3px; }
        .chat-main .message .message-footer .action-btn svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .chat-main .message .message-footer .action-btn:hover { background:rgba(128,128,128,0.25); color:var(--accent); opacity:1; }
        .chat-main .message .recall-btn { background:rgba(128,128,128,0.15); border:1px solid rgba(128,128,128,0.1); color:var(--text-secondary); font-size:11px; cursor:pointer; padding:2px 10px; border-radius:4px; transition:all 0.2s; touch-action:manipulation; }
        .chat-main .message .recall-btn:hover { background:rgba(255,100,100,0.2); color:#f87171; }
        .chat-main .message .recalled { opacity:0.6; font-style:italic; }
        .chat-main .message .quote-btn { display:none; position:absolute; top:-10px; right:0; background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius-sm); padding:2px 8px; font-size:12px; cursor:pointer; color:var(--text-secondary); box-shadow:var(--shadow); z-index:10; }
        .chat-main .message:hover .quote-btn { display:flex; align-items:center; gap:4px; }
        .chat-main .message .quote-btn:hover { color:var(--accent); }
        .user-profile-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); justify-content:center; align-items:center; z-index:500; animation:fadeIn 0.2s ease; }
        .user-profile-modal.active { display:flex; }
        .user-profile-modal .modal-content { background:var(--bg-card); border-radius:var(--radius); padding:32px; max-width:360px; width:90%; border:1px solid var(--border-color); box-shadow:var(--shadow); text-align:center; }
        .user-profile-modal .modal-content .avatar-large { width:96px; height:96px; border-radius:50%; object-fit:cover; background:var(--bg-input); margin:0 auto 12px; border:3px solid var(--accent); }
        .user-profile-modal .modal-content .display-name { font-size:20px; font-weight:700; margin-bottom:4px; }
        .user-profile-modal .modal-content .email { font-size:14px; color:var(--text-secondary); margin-bottom:12px; }
        .user-profile-modal .modal-content .detail-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border-color); font-size:13px; }
        .user-profile-modal .modal-content .detail-item:last-child { border-bottom:none; }
        .user-profile-modal .modal-content .detail-item .label { color:var(--text-secondary); }
        .user-profile-modal .modal-content .detail-item .value { font-weight:500; }
        .user-profile-modal .modal-content .status-badge { display:inline-block; padding:2px 12px; border-radius:20px; font-size:12px; font-weight:600; background:#4ade80; color:#000; margin-top:4px; }
        .user-profile-modal .modal-content .status-badge.offline { background:var(--text-muted); color:#fff; }
        .user-profile-modal .modal-close { margin-top:16px; background:var(--bg-input); border:none; padding:10px; border-radius:var(--radius-sm); color:var(--text-primary); font-weight:500; cursor:pointer; width:100%; transition:background 0.2s; }
        .user-profile-modal .modal-close:hover { background:var(--bg-hover); }
        .avatar-upload-area { display:flex; align-items:center; gap:16px; margin:6px 0 4px; }
        .avatar-upload-area .preview { width:48px; height:48px; border-radius:50%; object-fit:cover; background:var(--bg-input); border:2px solid var(--border-color); flex-shrink:0; }
        .avatar-upload-area .upload-btn { padding:6px 14px; background:var(--accent); border:none; border-radius:var(--radius-sm); color:#fff; font-size:12px; cursor:pointer; transition:background 0.2s; }
        .avatar-upload-area .upload-btn:hover { background:var(--accent-hover); }
        .avatar-upload-area input[type="file"] { display:none; }
        .avatar-upload-status { font-size:12px; color:var(--text-secondary); margin-top:2px; }
        .attachment-area { display:flex; flex-wrap:wrap; gap:8px; padding:4px 24px; background:var(--bg-secondary); border-bottom:1px solid var(--border-color); min-height:0; }
        .attachment-area:empty { display:none; }
        .attachment-item { display:flex; align-items:center; gap:6px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius-sm); padding:4px 8px 4px 4px; font-size:12px; color:var(--text-secondary); max-width:200px; }
        .attachment-item img { width:32px; height:32px; object-fit:cover; border-radius:4px; }
        .attachment-item .file-icon { font-size:20px; line-height:1; }
        .attachment-item .file-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .attachment-item .remove-attach { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:16px; line-height:1; padding:0 2px; }
        .attachment-item .remove-attach:hover { color:#f87171; }
        .attachment-item.quote-attachment { flex-direction:column; align-items:flex-start; gap:3px; max-width:320px; padding:8px 10px; border-left:3px solid var(--accent); background:var(--quote-bg); }
        .attachment-item.quote-attachment .qa-label { font-size:10px; color:var(--accent); font-weight:600; display:flex; align-items:center; gap:3px; text-transform:uppercase; letter-spacing:0.5px; }
        .attachment-item.quote-attachment .qa-author { font-size:12px; font-weight:700; color:var(--quote-author); }
        .attachment-item.quote-attachment .qa-text { font-size:12px; color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; line-height:1.4; }
        .chat-main .input-area { padding:12px 24px 20px; background:var(--bg-secondary); border-top:1px solid var(--border-color); display:flex; align-items:center; gap:8px; flex-shrink:0; flex-wrap:wrap; position:relative; }
        .chat-main .input-area .input-group { flex:1; display:flex; align-items:center; gap:8px; min-width:0; position:relative; }
        .chat-main .input-area .input-group textarea { flex:1; padding:10px 14px; border-radius:24px; border:1px solid var(--border-color); background:var(--bg-input); color:var(--text-primary); font-size:15px; outline:none; transition:var(--transition); resize:vertical; min-height:48px; max-height:150px; line-height:1.5; font-family:inherit; white-space:pre-wrap; word-wrap:break-word; }
        .chat-main .input-area .input-group textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        .chat-main .input-area .input-group textarea.editing { border-color:#fbbf24; box-shadow:0 0 0 3px rgba(251,191,36,0.2); }
        .chat-main .input-area .input-group textarea::-webkit-scrollbar { width:4px; }
        .chat-main .input-area .input-group textarea::-webkit-scrollbar-thumb { background:var(--text-muted); border-radius:10px; }
        .chat-main .input-area .btn-icon { background:none; border:none; padding:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:var(--radius-sm); transition:var(--transition); color:var(--text-secondary); }
        .chat-main .input-area .btn-icon:hover { background:var(--bg-hover); color:var(--text-primary); }
        .chat-main .input-area .btn-icon svg { width:24px; height:24px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .chat-main .input-area .send-btn { background:var(--accent); border:none; border-radius:50%; width:48px; height:48px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:var(--transition); flex-shrink:0; }

/* 富文本内容渲染器 */
function renderMessageContent(rawContent){
    if(!rawContent)return'';
    var text=rawContent,quotes=[],images=[],audios=[];

    text=text.replace(/!\[image\]\(([^)]+)\)/g,function(_,u){var i=images.length;images.push(u);return'\x00I'+i+'I\x00';});
    text=text.replace(/\[audio\]\(([^)]+)\)/g,function(_,u){var i=audios.length;audios.push(u);return'\x00A'+i+'A\x00';});
    text=text.replace(/@(\S+)/g,'<span class="mention">@$1</span>');

    return text;
}

function compressImage(file,maxW,q){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas');var w=img.width,h=img.height;if(w>maxW){h=h*(maxW/w);w=maxW;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(function(b){if(!b){rej(new Error('压缩失败'));return;}res(new File([b],file.name,{type:'image/jpeg',lastModified:Date.now()}));},'image/jpeg',q);};img.onerror=rej;img.src=e.target.result;};r.onerror=rej;r.readAsDataURL(file);});}

async function uploadAvatar(file){

var fc2=text;var qa2=attachments.filter(function(a){return a.type==='quote';});qa2.forEach(function(q){fc2='[quote:'+q.quoteAuthor+'|'+q.quoteTime+'|'+q.quoteText+']\n'+fc2;});var na2=attachments.filter(function(a){return!a.existing&&a.type!=='quote';});var nmd2=await uploadNewAttachments(na2);if(nmd2.length){if(fc2)fc2+='\n';fc2+=nmd2.join('\n');}if(!fc2.trim()){setAuthMessage('内容不能为空','error');setTimeout(function(){setAuthMessage('');},2000);isSending=false;btnSend.disabled=false;chatInput.disabled=false;return;}

var tempId='temp-'+Date.now();addMessageToBottom({id:tempId,content:fc2,sender_name:senderName,sender_email:currentEmail,isMe:true,time:formatTimeShort(new Date().toISOString()),created_at:new Date().toISOString(),avatar_url:currentAvatarUrl||getDefaultAvatar(currentEmail)});chatInput.value='';attachments=[];renderAttachments();autoResizeTextarea();var dr=await supabase.from('messages').insert({content:fc2,sender_name:senderName,sender_email:currentEmail}).select().single();if(dr.error)throw dr.error;if(dr.data){var te=messageList.querySelector('[data-message-id="'+tempId+'"]');var realMsg={id:dr.data.id,content:dr.data.content,sender_name:dr.data.sender_name||senderName,sender_email:dr.data.sender_email||currentEmail,isMe:true,time:formatTimeShort(dr.data.created_at),created_at:dr.data.created_at,avatar_url:currentAvatarUrl||getDefaultAvatar(currentEmail)};if(te)te.replaceWith(createMessageElement(realMsg));else addMessageToBottom(realMsg);}}catch(err){console.error(err);if(text){chatInput.value=text;autoResizeTextarea();}setAuthMessage('发送失败，请重试','error');setTimeout(function(){if(authMessage.textContent==='发送失败，请重试')authMessage.textContent='';},3000);var te2=messageList.querySelector('[data-message-id^="temp-"]');if(te2)te2.remove();}finally{isSending=false;btnSend.disabled=false;chatInput.disabled=false;}}

window.recallMessage=async function(mid){if(!mid)return;if(!confirm('确定撤回？'))return;try{var r=await supabase.from('messages').update({content:'（已撤回）'}).eq('id',mid).eq('sender_email',currentEmail);if(r.error){setAuthMessage('撤回失败','error');setTimeout(function(){setAuthMessage('');},3000);}}catch(e){console.error(e);}};

function updateOnlineUI(){onlineStatus.textContent='● '+onlineCount+' 人在线';onlineBadge.textContent=onlineCount;onlineBadge.classList.toggle('show',onlineCount>0);modalOnlineCount.textContent=onlineCount;renderOnlineUsers();}
function renderOnlineUsers(){onlineUserList.innerHTML='';if(!onlineCount){onlineUserList.innerHTML='<div class="online-empty">暂无其他在线用户</div>';return;}for(var id in onlineUsers){var u=onlineUsers[id];var it=document.createElement('div');it.className='online-user-item';it.innerHTML='<img class="avatar-small" src="'+(u.avatar_url||getDefaultAvatar(u.email))+'" onerror="this.src=\''+getDefaultAvatar(u.email)+'\'" /><span class="online-dot"></span><span class="online-user-name">'+escHtml(u.display_name||'匿名')+'</span>';onlineUserList.appendChild(it);}}

var mentionActive=false;
chatInput.addEventListener('input',function(){var v=this.value,cp=this.selectionStart,la=v.lastIndexOf('@',cp);if(la!==-1){var after=v.substring(la+1,cp);if(after.indexOf(' ')===-1){mentionActive=true;renderMentionDropdown(after);mentionDropdown.classList.add('active');return;}}mentionActive=false;mentionDropdown.classList.remove('active');sendTypingEvent();autoResizeTextarea();});
function renderMentionDropdown(filter){var users=Object.values(onlineUsers).filter(function(u){return u.user_id!==currentUserId;});var f=users.filter(function(u){return(u.display_name||'').toLowerCase().indexOf(filter.toLowerCase())!==-1||(u.email||'').toLowerCase().indexOf(filter.toLowerCase())!==-1;});mentionDropdown.innerHTML='';if(!f.length){mentionDropdown.innerHTML='<div class="mention-item" style="color:var(--text-muted)">没有找到用户</div>';return;}f.forEach(function(u){var it=document.createElement('div');it.className='mention-item';it.innerHTML='<img src="'+(u.avatar_url||getDefaultAvatar(u.email))+'" /><span class="name">'+escHtml(u.display_name||u.email)+'</span><span class="email">'+escHtml(u.email)+'</span>';it.addEventListener('click',function(){var v=chatInput.value,cp=chatInput.selectionStart,la=v.lastIndexOf('@',cp);if(la!==-1){var b=v.substring(0,la),a=v.substring(cp),mt='@'+(u.display_name||u.email)+' ';chatInput.value=b+mt+a;chatInput.selectionStart=chatInput.selectionEnd=b.length+mt.length;chatInput.focus();}mentionDropdown.classList.remove('active');mentionActive=false;autoResizeTextarea();});mentionDropdown.appendChild(it);});}
document.addEventListener('click',function(e){if(mentionActive&&!mentionDropdown.contains(e.target)&&e.target!==chatInput){mentionDropdown.classList.remove('active');mentionActive=false;}});

var typingStopId=null,lastTypingBT=0;
function sendTypingEvent(){if(!window.chatChannel||!currentUserId)return;var n=Date.now();if(n-lastTypingBT<1500)return;lastTypingBT=n;window.chatChannel.send({type:'broadcast',event:'typing',payload:{user_id:currentUserId,display_name:currentDisplayName||currentEmail.split('@')[0],avatar_url:currentAvatarUrl||getDefaultAvatar(currentEmail)}});}
function showTypingIndicator(dn){var i=$('typingIndicator'),t=$('typingText');if(!i||!t)return;t.textContent=(dn||'用户')+' 正在输入';i.classList.add('active');clearTimeout(typingStopId);typingStopId=setTimeout(function(){i.classList.remove('active');},2000);}

function subscribeMessages(){if(window.chatChannel){window.chatChannel.unsubscribe();window.chatChannel=null;}var ch=supabase.channel('chat-room',{config:{presence:{key:currentUserId}}});
ch.on('presence',{event:'sync'},function(){var s=ch.presenceState(),us={};var c=0;for(var k in s){var ps=s[k];var p=ps[0];if(p){var em=p.email||'';us[k]={user_id:k,display_name:p.display_name||'匿名',email:em,avatar_url:p.avatar_url||getDefaultAvatar(em)};if(em&&p.avatar_url){if(currentUserMap[em])currentUserMap[em].avatar_url=p.avatar_url;else currentUserMap[em]={avatar_url:p.avatar_url};updateAllMessageAvatars(em,p.avatar_url);}c++;}}onlineUsers=us;onlineCount=c;updateOnlineUI();});
ch.on('broadcast',{event:'typing'},function({payload}){if(payload.user_id===currentUserId)return;showTypingIndicator(payload.display_name);});
ch.on('broadcast',{event:'mention'},function({payload}){if(payload.users.indexOf(currentUserId)!==-1){if('Notification' in window&&Notification.permission==='granted')new Notification('📢 有人@了你',{body:payload.from+' 在消息中提到了你',icon:'assets/logo.svg'});else{setAuthMessage('📢 '+payload.from+' 提到了你','success');setTimeout(function(){setAuthMessage('');},5000);}}});
ch.on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},function({new:m}){try{if(!m)return;if(m.sender_email===currentEmail)return;var au=currentUserMap[m.sender_email]?currentUserMap[m.sender_email].avatar_url:null;if(!au)au=getDefaultAvatar(m.sender_email);var ou=Object.values(onlineUsers).find(function(u){return u.email===m.sender_email;});if(ou&&ou.avatar_url)au=ou.avatar_url;addMessageToBottom({id:m.id,content:m.content,sender_name:m.sender_name||'匿名',sender_email:m.sender_email,isMe:false,time:formatTimeShort(m.created_at),created_at:m.created_at,avatar_url:au});if(document.hidden){unreadCount++;document.title='('+unreadCount+') MiniChat';if('Notification' in window&&Notification.permission==='granted'){var n=new Notification('新消息',{body:(m.sender_name||'用户')+': '+((m.content||'').substring(0,50)),icon:'assets/logo.svg'});setTimeout(function(){n.close();},5000);}}}catch(e){console.error(e);}});
ch.on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},function({new:u}){try{document.querySelectorAll('.message[data-message-id="'+u.id+'"]').forEach(function(el){el.replaceWith(createMessageElement({id:u.id,content:u.content,sender_name:u.sender_name,sender_email:u.sender_email,isMe:u.sender_email===currentEmail,time:formatTimeShort(u.created_at),created_at:u.created_at,avatar_url:currentUserMap[u.sender_email]?currentUserMap[u.sender_email].avatar_url:getDefaultAvatar(u.sender_email)}));});}catch(e){console.error(e);}});
ch.on('postgres_changes',{event:'DELETE',schema:'public',table:'messages'},function({old:d}){if(!d)return;var el=messageList.querySelector('.message[data-message-id="'+d.id+'"]');if(el)el.remove();});
ch.subscribe(async function(status){if(status==='SUBSCRIBED'){await ch.track({user_id:currentUserId,email:currentEmail,display_name:currentDisplayName||currentEmail.split('@')[0],avatar_url:currentAvatarUrl||getDefaultAvatar(currentEmail),online_at:new Date().toISOString()});}});
window.chatChannel=ch;}

window.previewImage=function(url){var o=document.createElement('div');o.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:20px;';var img=document.createElement('img');img.src=url;img.style.cssText='max-width:100%;max-height:70%;object-fit:contain;border-radius:12px;margin-bottom:24px;';var bc=document.createElement('div');bc.style.cssText='display:flex;gap:16px;';var db=document.createElement('button');db.textContent='下载图片';db.style.cssText='padding:12px 28px;border:none;border-radius:10px;background:#3b82f6;color:#fff;font-size:15px;cursor:pointer;';db.onclick=function(e){e.stopPropagation();db.textContent='下载中…';db.disabled=true;fetch(url).then(function(r){return r.blob();}).then(function(b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=url.split('/').pop().split('?')[0]||'image.jpg';document.body.appendChild(a);a.click();a.remove();db.textContent='已下载';setTimeout(function(){db.textContent='下载图片';db.disabled=false;},2000);}).catch(function(){db.textContent='下载失败';setTimeout(function(){db.textContent='下载图片';db.disabled=false;},2000);});};var cb=document.createElement('button');cb.textContent='关闭';cb.style.cssText='padding:12px 28px;border:none;border-radius:10px;background:rgba(255,255,255,0.15);color:#fff;font-size:15px;cursor:pointer;';cb.onclick=function(e){e.stopPropagation();document.body.removeChild(o);};bc.appendChild(db);bc.appendChild(cb);o.addEventListener('click',function(e){if(e.target===o)document.body.removeChild(o);});o.appendChild(img);o.appendChild(bc);document.body.appendChild(o);};

chatInput.addEventListener('dragover',function(e){e.preventDefault();this.style.borderColor='var(--accent)';});
chatInput.addEventListener('dragleave',function(e){e.preventDefault();this.style.borderColor='';});
chatInput.addEventListener('drop',function(e){e.preventDefault();this.style.borderColor='';var f=e.dataTransfer.files;if(f)for(var i=0;i<f.length;i++)if(f[i].type.indexOf('image')===0||f[i].type.indexOf('audio')===0)addAttachment(f[i]);});
chatInput.addEventListener('paste',function(e){for(var i=0;i<e.clipboardData.items.length;i++){var item=e.clipboardData.items[i];if(item.type.indexOf('image')!==-1){e.preventDefault();var f=item.getAsFile();if(f)addAttachment(f);return;}if(item.kind==='file'&&item.type.indexOf('audio')===0){e.preventDefault();var f2=item.getAsFile();if(f2)addAttachment(f2);return;}}});
attachBtn.addEventListener('click',function(e){e.preventDefault();fileInput.click();});
fileInput.addEventListener('change',function(e){var f=e.target.files;if(f)for(var i=0;i<f.length;i++)addAttachment(f[i]);fileInput.value='';});

chatInput.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessageContent(this.value);}if(e.key==='Escape'&&editingMessageId){editingMessageId=null;editingAttachments=[];this.classList.remove('editing');this.value='';attachments=[];renderAttachments();setAuthMessage('已取消编辑','success');setTimeout(function(){setAuthMessage('');},1500);autoResizeTextarea();}});
btnSend.addEventListener('click',function(){sendMessageContent(chatInput.value);});

var emojiVisible=false;
emojiBtn.addEventListener('click',function(e){e.stopPropagation();emojiVisible=!emojiVisible;emojiPicker.classList.toggle('active',emojiVisible);});
emojiPicker.addEventListener('click',function(e){if(e.target.tagName==='SPAN'){insertAtCursor(e.target.textContent);emojiPicker.classList.remove('active');emojiVisible=false;}});
document.addEventListener('click',function(e){if(emojiVisible&&!emojiPicker.contains(e.target)&&e.target!==emojiBtn){emojiPicker.classList.remove('active');emojiVisible=false;}});

document.addEventListener('visibilitychange',function(){if(!document.hidden){unreadCount=0;document.title='MiniChat';}});
window.addEventListener('beforeunload',async function(){if(window.chatChannel)try{await window.chatChannel.untrack();}catch(e){}});
btnLogin.addEventListener('click',handleAuth);
$('switchToSignup').addEventListener('click',function(){switchMode('signup');});
$('togglePwd').addEventListener('click',function(){var t=authPassword.getAttribute('type')==='password'?'text':'password';authPassword.setAttribute('type',t);this.textContent=t==='password'?'显示':'隐藏';});
settingsNav.addEventListener('click',function(){settingsOverlay.classList.add('active');});
closeSettingsEl.addEventListener('click',closeSettingsFunc);
settingsOverlay.addEventListener('click',function(e){if(e.target===this)closeSettingsFunc();});
themeToggle.addEventListener('click',toggleTheme);
settingsLogout.addEventListener('click',handleLogout);
saveDisplayNameBtn.addEventListener('click',saveDisplayName);
displayNameInput.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();saveDisplayName();}});
avatarUploadBtn.addEventListener('click',function(){avatarFileInput.click();});
avatarFileInput.addEventListener('change',function(e){if(e.target.files.length)uploadAvatar(e.target.files[0]);this.value='';});
onlineUsersBtn.addEventListener('click',function(e){e.stopPropagation();onlineModal.classList.toggle('active');});
closeOnlineModal.addEventListener('click',function(){onlineModal.classList.remove('active');});
document.addEventListener('click',function(e){if(onlineModal.classList.contains('active')&&!onlineModal.contains(e.target)&&!onlineUsersBtn.contains(e.target))onlineModal.classList.remove('active');});
closeProfileModal.addEventListener('click',function(){profileModal.classList.remove('active');});
profileModal.addEventListener('click',function(e){if(e.target===this)profileModal.classList.remove('active');});

(function(){var DUR=1800,splash=$('splash'),fill=$('splashFill');function hide(){if(!splash)return;splash.classList.add('hidden');setTimeout(function(){if(splash&&splash.parentNode)splash.parentNode.removeChild(splash);},420);loginOverlay.classList.remove('hidden');var raw=localStorage.getItem('minichat_user');if(raw)try{var u=JSON.parse(raw);if(u&&u.email){currentEmail=u.email;currentUserId=u.id||'';supabase.auth.getSession().then(function(r){if(r.data.session)enterChat();}).catch(function(){});return;}}catch(e){}}document.addEventListener('DOMContentLoaded',function(){if(fill){fill.style.width='0%';void fill.offsetWidth;fill.style.transition='width '+DUR+'ms linear';fill.style.width='100%';}setTimeout(hide,DUR+120);});})();

loadTheme();
