<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MiniChat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
    </script>
    <style>
        /* ===== 全局重置 & 双主题变量（与原来完全相同） ===== */
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-sidebar: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2a2a2a;
            --bg-hover: #2a2a2a;
            --bg-overlay: rgba(0,0,0,0.7);
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #2a2a2a;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
        }
        body.light-theme {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-sidebar: #f7f8fa;
            --bg-card: #ffffff;
            --bg-input: #eef0f2;
            --bg-hover: #e8eaed;
            --bg-overlay: rgba(255,255,255,0.7);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #d0d5dd;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            transition: background 0.3s, color 0.3s;
        }
        .app {
            width: 100%;
            max-width: 1300px;
            height: 96vh;
            max-height: 900px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
            position: relative;
        }
        /* ===== Splash 遮罩 ===== */
        .splash {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #000000;
            z-index: 400;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            pointer-events: auto;
        }
        .splash.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .splash-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .splash-inner .splash-icon {
            height: 240px;
            width: 240px;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(59,130,246,0.3));
        }
        .splash-divider {
            width: 2px;
            height: 80px;
            background: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }
        .splash-bar {
            width: 320px;
            max-width: calc(100% - 80px);
            height: 6px;
            border-radius: 6px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.5);
        }
        .splash-bar .fill {
            height: 100%;
            width: 0%;
            background: #3b82f6;
            border-radius: 6px;
            transition: width 0.25s linear;
            animation: splashFill 2.6s linear 1 forwards;
        }
        @keyframes splashFill {
            from { width: 0%; }
            to { width: 100%; }
        }
        /* ===== 登录界面（新：邮箱+密码） ===== */
        .login-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-overlay);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            border-radius: var(--radius);
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .login-card {
            background: var(--bg-card);
            padding: 40px 36px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s;
        }
        .login-card .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .login-card .logo-area img {
            height: 40px;
            width: auto;
        }
        .login-card .logo-area h1 {
            display: none;
        }
        .login-card .auth-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .login-card .auth-sub {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .login-card input {
            width: 100%;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            margin-bottom: 14px;
        }
        .login-card input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .login-card .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 6px;
        }
        .login-card .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }
        .login-card .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .login-card .auth-message {
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
            min-height: 20px;
        }
        .login-card .auth-message.success {
            color: #4ade80;
        }
        .login-card .auth-message.error {
            color: #f87171;
        }
        .login-card .auth-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 14px;
            font-size: 14px;
        }
        .login-card .auth-toggle a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
        }
        .login-card .auth-toggle a:hover {
            text-decoration: underline;
        }
        /* 密码可见切换 */
        .login-card .pwd-wrapper {
            position: relative;
        }
        .login-card .pwd-wrapper .toggle-pwd {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
        }
        /* ===== 主界面、聊天区、设置面板（与原来完全一致） ===== */
        .main-interface {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .main-interface.hidden {
            display: none;
        }
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            transition: background 0.3s, border-color 0.3s;
        }
        .sidebar .logo-area {
            display: flex;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .sidebar .logo-area img {
            height: 36px;
            max-width: 100%;
            object-fit: contain;
        }
        .sidebar .logo-area span {
            display: none;
        }
        .sidebar .nav {
            flex: 1;
        }
        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .sidebar .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .sidebar .nav-item.active {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .sidebar .nav-item svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .sidebar .user-section {
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            margin-top: auto;
        }
        .sidebar .user-email {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 8px 0;
        }
        .sidebar .logout-btn {
            display: none;
        }
        .chat-main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            transition: background 0.3s;
        }
        .chat-main .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-main .chat-header .chat-title {
            font-size: 18px;
            font-weight: 600;
        }
        .chat-main .chat-header .chat-title small {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 10px;
        }
        .chat-main .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--bg-primary);
            transition: background 0.3s;
        }
        .chat-main .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-main .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-main .chat-messages::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }
        .chat-main .message {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeIn 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .chat-main .message.me {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 6px;
        }
        .chat-main .message.other {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
            border: 1px solid var(--border-color);
        }
        .chat-main .message .sender {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .chat-main .message.me .sender {
            color: rgba(255,255,255,0.8);
        }
        .chat-main .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 6px;
            text-align: right;
        }
        .chat-main .message img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            display: block;
            margin-top: 6px;
            cursor: pointer;
            border: none;
        }
        .chat-main .input-area {
            padding: 12px 24px 20px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .chat-main .input-area #attachBtn {
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            color: var(--text-secondary);
        }
        .chat-main .input-area #attachBtn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .chat-main .input-area #attachBtn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .chat-main .input-area input[type="text"] {
            flex: 1;
            padding: 12px 18px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
        }
        .chat-main .input-area input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .chat-main .input-area .send-btn {
            background: var(--accent);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .chat-main .input-area .send-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }
        .chat-main .input-area .send-btn svg {
            width: 24px;
            height: 24px;
            display: block;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .settings-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-overlay);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            border-radius: var(--radius);
            transition: opacity 0.25s ease, visibility 0.25s ease;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .settings-overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .settings-panel {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 32px 36px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            transition: background 0.3s, border-color 0.3s;
        }
        .settings-panel h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }
        .settings-panel .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .settings-panel .setting-item:last-child {
            border-bottom: none;
        }
        .settings-panel .setting-item .label {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .settings-panel .setting-item .desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .toggle-switch {
            width: 48px;
            height: 28px;
            background: var(--bg-input);
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.25s;
            position: relative;
            flex-shrink: 0;
        }
        .toggle-switch .knob {
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.25s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .toggle-switch.active {
            background: var(--accent);
        }
        .toggle-switch.active .knob {
            transform: translateX(20px);
        }
        .settings-panel .btn-danger {
            background: #dc2626;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .settings-panel .btn-danger:hover {
            background: #b91c1c;
        }
        .settings-panel .close-settings {
            margin-top: 20px;
            background: var(--bg-input);
            border: none;
            padding: 10px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .settings-panel .close-settings:hover {
            background: var(--bg-hover);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            body { padding: 0; }
            .app { max-height: 100vh; border-radius: 0; }
            .sidebar { width: 200px; padding: 12px; }
            .sidebar .nav-item span { display: none; }
            .sidebar .nav-item { justify-content: center; }
            .sidebar .user-email { font-size: 11px; text-align: center; }
            .chat-main .chat-header { padding: 12px 16px; }
            .chat-main .chat-messages { padding: 12px; }
            .chat-main .input-area { padding: 10px 16px 16px; gap: 8px; }
            .login-card { padding: 28px 20px; }
            .splash-inner .splash-icon {
                height: 120px;
                width: 120px;
            }
            .splash-divider {
                height: 120px;
            }
            .splash-inner { gap: 6px; }
            .splash-bar { width: 260px; }
        }
        @media (max-width: 480px) {
            .sidebar { width: 60px; padding: 8px; }
            .sidebar .logo-area img { height: 28px; max-width: 40px; }
            .sidebar .nav-item { padding: 10px; }
            .chat-main .message { max-width: 90%; }
            .splash-inner .splash-icon {
                height: 80px;
                width: 80px;
            }
            .splash-divider {
                height: 80px;
            }
            .splash-inner { gap: 4px; }
            .splash-bar { width: calc(100% - 48px); }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Splash -->
        <div class="splash" id="splash" role="status" aria-live="polite">
            <div class="splash-inner">
                <img class="splash-icon" src="assets/Inspired.svg" alt="Inspired" />
                <div class="splash-divider"></div>
                <img class="splash-icon" src="assets/basied.svg" alt="basied" />
            </div>
            <div class="splash-bar" aria-hidden="true">
                <div class="fill" id="splashFill"></div>
            </div>
        </div>

        <!-- 登录界面（新：邮箱 + 密码） -->
        <div class="login-overlay" id="loginOverlay">
            <div class="login-card">
                <div class="logo-area">
                    <img src="assets/logo.svg" alt="Logo" />
                    <h1>MiniChat</h1>
                </div>
                <div class="auth-title" id="authTitle">欢迎回来</div>
                <div class="auth-sub" id="authSub">登录或注册账户</div>
                <input type="email" id="authEmail" placeholder="电子邮箱" />
                <div class="pwd-wrapper">
                    <input type="password" id="authPassword" placeholder="密码" />
                    <button class="toggle-pwd" id="togglePwd" type="button">显示</button>
                </div>
                <button class="btn-primary" id="btnLogin">登录</button>
                <div class="auth-toggle">
                    <span>还没有账户？<a id="switchToSignup">注册</a></span>
                </div>
                <div class="auth-message" id="authMessage"></div>
            </div>
        </div>

        <!-- 主界面 -->
        <div class="main-interface hidden" id="mainInterface">
            <aside class="sidebar">
                <div class="logo-area">
                    <img src="assets/logo.svg" alt="Logo" />
                    <span>MiniChat</span>
                </div>
                <nav class="nav">
                    <div class="nav-item active">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span>聊天</span>
                    </div>
                    <div class="nav-item" id="settingsNav">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        <span>设置</span>
                    </div>
                </nav>
                <div class="user-section">
                    <div class="user-email" id="sidebarUserEmail">未登录</div>
                </div>
            </aside>
            <main class="chat-main">
                <div class="chat-header">
                    <div class="chat-title">
                        全局聊天
                        <small># 所有成员</small>
                    </div>
                    <div style="font-size:13px;color:var(--text-secondary);">
                        <span id="onlineStatus">● 在线</span>
                    </div>
                </div>
                <div class="chat-messages" id="messageList"></div>
                <div class="input-area">

        // ==========================================

        // ==========================================
        // 工具函数
        // ==========================================
        function formatTime(iso) {
            const d = new Date(iso);
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function setAuthMessage(msg, type) {
            authMessage.textContent = msg;
            authMessage.className = 'auth-message';
            if (type === 'success') authMessage.classList.add('success');
            if (type === 'error') authMessage.classList.add('error');

        // 图片预览（与原来相同）
        window.previewImage = function(url) {
            const overlay = document.createElement('div');
            overlay.style.cssText =
                'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:20px;';
            const img = document.createElement('img');
            img.src = url;
            img.style.cssText =
                'max-width:100%;max-height:70%;object-fit:contain;border-radius:12px;margin-bottom:24px;box-shadow:0 10px 30px rgba(0,0,0,0.5);';
            const btnContainer = document.createElement('div');
            btnContainer.style.cssText = 'display:flex;gap:16px;flex-wrap:wrap;justify-content:center;';
            const downloadBtn = document.createElement('button');
            downloadBtn.textContent = '下载图片';
            downloadBtn.style.cssText =
                'padding:12px 28px;border:none;border-radius:10px;background:#3b82f6;color:#fff;font-size:15px;font-weight:500;cursor:pointer;';
            downloadBtn.onclick = function(e) {
                e.stopPropagation();
                downloadBtn.textContent = '下载中…';
                downloadBtn.disabled = true;
                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error('下载失败');
                        return res.blob();
                    })
                    .then(blob => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        const filename = url.split('/').pop().split('?')[0] || 'image.jpg';
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        URL.revokeObjectURL(a.href);
                        downloadBtn.textContent = '已下载';
                        setTimeout(() => {
                            downloadBtn.textContent = '下载图片';
                            downloadBtn.disabled = false;
                        }, 2000);
                    })
                    .catch(err => {
                        console.error('下载失败:', err);
                        downloadBtn.textContent = '下载失败';
                        setTimeout(() => {
                            downloadBtn.textContent = '下载图片';
                            downloadBtn.disabled = false;
                        }, 2000);
                    });
            };
            const closeBtn = document.createElement('button');
            closeBtn.textContent = '关闭';
            closeBtn.style.cssText =
                'padding:12px 28px;border:none;border-radius:10px;background:rgba(255,255,255,0.15);color:#fff;font-size:15px;font-weight:500;cursor:pointer;';
            closeBtn.onclick = function(e) {
                e.stopPropagation();
                document.body.removeChild(overlay);
            };
            btnContainer.appendChild(downloadBtn);
            btnContainer.appendChild(closeBtn);
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    document.body.removeChild(overlay);
                }
            });
            overlay.appendChild(img);
            overlay.appendChild(btnContainer);
            document.body.appendChild(overlay);
        };

        // 创建消息元素（与原来相同）
        function createMessageElement(content, sender, isMe, time) {
            const div = document.createElement('div');
            div.className = 'message ' + (isMe ? 'me' : 'other');
            if (!content) content = '';
            const imageMatch = content.match(/!\[image\]\((.*?)\)/);
            let displayContent = content;
            if (imageMatch) {
                const url = imageMatch[1];
                displayContent =
                    `<img src="${url}" onclick="window.previewImage && window.previewImage('${url}')" alt="图片" loading="lazy" />`;
            } else {
                displayContent = content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }
            div.innerHTML = '<div class="sender">' + sender + '</div>' + displayContent +
                '<div class="time">' + (time || formatTime(new Date().toISOString())) + '</div>';
            return div;
        }

        function addMessageToBottom(content, sender, isMe, time) {
            const div = createMessageElement(content, sender, isMe, time);
            messageList.appendChild(div);
            messageList.scrollTop = messageList.scrollHeight;
        }

        function prependMessages(messages) {
            const fragment = document.createDocumentFragment();
            messages.forEach(msg => {
                const isMe = (msg.sender_name === currentEmail);
                const div = createMessageElement(msg.content, msg.sender_name || '匿名', isMe, formatTime(msg.created_at));
                fragment.appendChild(div);
            });
            const firstChild = messageList.firstChild;
            if (firstChild) {
                messageList.insertBefore(fragment, firstChild);
            } else {
                messageList.appendChild(fragment);
            }
        }

        function cacheMessages(messages) {
            try {
                localStorage.setItem('minichat_messages', JSON.stringify(messages));
            } catch (e) { /* ignore */ }
        }

        function getCachedMessages() {
            try {
                const data = localStorage.getItem('minichat_messages');
                return data ? JSON.parse(data) : null;
            } catch (e) { return null; }
        }

        function setLoading(loading) {
            btnLogin.disabled = loading;
            btnLogin.style.opacity = loading ? '0.6' : '1';
        }

        // ==========================================
        // 认证逻辑（Supabase Auth）
        // ==========================================
        function switchMode(mode) {
            isLoginMode = (mode === 'login');
            if (isLoginMode) {
                authTitle.textContent = '欢迎回来';
                authSub.textContent = '登录你的账户';
                btnLogin.textContent = '登录';
                switchToSignup.textContent = '注册';
                switchToSignup.parentElement.innerHTML = '还没有账户？<a id="switchToSignup">注册</a>';
                document.getElementById('switchToSignup').addEventListener('click', () => switchMode('signup'));
            } else {
                authTitle.textContent = '创建账户';
                authSub.textContent = '使用邮箱和密码注册';
                btnLogin.textContent = '注册';
                switchToSignup.textContent = '登录';
                switchToSignup.parentElement.innerHTML = '已有账户？<a id="switchToSignup">登录</a>';
                document.getElementById('switchToSignup').addEventListener('click', () => switchMode('login'));
            }
            setAuthMessage('');
        }

        async function handleAuth() {
            const email = authEmail.value.trim();
            const password = authPassword.value.trim();
            if (!email || !password) {
                setAuthMessage('请填写邮箱和密码', 'error');
                return;
            }
            if (password.length < 6) {
                setAuthMessage('密码至少6位', 'error');
                return;
            }
            setLoading(true);
            setAuthMessage('处理中…', '');

            try {
                let result;
                if (isLoginMode) {
                    // 登录
                    result = await supabase.auth.signInWithPassword({ email, password });
                } else {
                    // 注册
                    result = await supabase.auth.signUp({ email, password });
                }
                if (result.error) {
                    setAuthMessage(result.error.message, 'error');
                    setLoading(false);
                    return;
                }
                const user = result.data.user;
                if (!user) {
                    setAuthMessage('未获取到用户信息', 'error');
                    setLoading(false);
                    return;
                }

                // 登录/注册成功
                currentEmail = user.email;
                currentUserId = user.id;
                // 如果是注册，可能需等待确认邮件（但已关闭确认），直接登录
                // 但为了保险，检查 session 是否存在
                const { data: sessionData } = await supabase.auth.getSession();
                if (!sessionData.session) {
                    // 可能是注册后未自动登录（如果启用了邮件确认），但我们关闭了确认，应该已有session
                    // 如果还是没有，尝试再次登录
                    if (!isLoginMode) {
                        // 注册后自动登录
                        const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({ email, password });
                        if (signInError) {
                            setAuthMessage('注册成功，但自动登录失败，请尝试登录', 'error');
                            setLoading(false);
                            return;
                        }
                        // 更新用户
                        currentEmail = signInData.user.email;
                        currentUserId = signInData.user.id;
                    } else {
                        setAuthMessage('登录失败，请重试', 'error');
                        setLoading(false);
                        return;
                    }
                }

                // 确保 profiles 表有记录
                await ensureProfile(user.id, user.email);

                setAuthMessage(isLoginMode ? '登录成功' : '注册成功', 'success');
                setLoading(false);

                // 进入聊天
                enterChat();

            } catch (err) {
                console.error(err);
                setAuthMessage('网络错误，请重试', 'error');
                setLoading(false);
            }
        }

        // 确保 profiles 中存在该用户
        async function ensureProfile(userId, email) {
            // 查询是否存在
            const { data, error } = await supabase
                .from('profiles')
                .select('id')
                .eq('id', userId)
                .maybeSingle();
            if (error && error.code !== 'PGRST116') {
                console.error('查询 profiles 失败:', error);
                return;
            }
            if (!data) {
                // 插入
                const { error: insertError } = await supabase
                    .from('profiles')
                    .insert({ id: userId, email: email, last_login: new Date().toISOString() });
                if (insertError) {
                    console.error('插入 profiles 失败:', insertError);
                }
            } else {
                // 更新 last_login
                const { error: updateError } = await supabase
                    .from('profiles')
                    .update({ last_login: new Date().toISOString() })
                    .eq('id', userId);
                if (updateError) console.error('更新 last_login 失败:', updateError);
            }
        }

        // ==========================================
        // 分页加载历史消息（直接从 Supabase 查）
        // ==========================================
        async function loadHistory(append = false) {
            if (isLoadingMore || !hasMoreMessages) return;
            isLoadingMore = true;

            try {
                let query = supabase
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(PAGE_SIZE);

                if (oldestTimestamp) {
                    query = query.lt('created_at', oldestTimestamp);
                }

                const { data, error } = await query;
                if (error) throw error;

                if (!data || data.length === 0) {
                    hasMoreMessages = false;
                    isLoadingMore = false;
                    return;
                }

                const sorted = data.reverse();
                const earliest = sorted[0];
                oldestTimestamp = earliest.created_at;

                if (!append) {
                    messageList.innerHTML = '';
                    sorted.forEach(msg => {
                        const isMe = (msg.sender_name === currentEmail);
                        addMessageToBottom(msg.content, msg.sender_name || '匿名', isMe, formatTime(msg.created_at));
                    });
                    cacheMessages(sorted);
                } else {
                    prependMessages(sorted);
                }

                if (data.length < PAGE_SIZE) {
                    hasMoreMessages = false;
                }
                isLoadingMore = false;
            } catch (err) {
                console.error('加载历史消息失败:', err);
                isLoadingMore = false;
            }
        }

        // ==========================================
        // 进入聊天
        // ==========================================
        function enterChat() {
            loginOverlay.classList.add('hidden');
            mainInterface.classList.remove('hidden');
            sidebarUserEmail.textContent = currentEmail;

            hasMoreMessages = true;
            oldestTimestamp = null;
            isLoadingMore = false;
            unreadCount = 0;
            document.title = 'MiniChat';

            const cached = getCachedMessages();
            if (cached && cached.length > 0) {
                messageList.innerHTML = '';
                cached.forEach(msg => {
                    const isMe = (msg.sender_name === currentEmail);
                    addMessageToBottom(msg.content, msg.sender_name || '匿名', isMe, formatTime(msg.created_at));
                });
            } else {
                messageList.innerHTML = '';
            }

            loadHistory(false);

            localStorage.setItem('minichat_user', JSON.stringify({ email: currentEmail, id: currentUserId }));
            loadTheme();

            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }

            subscribeMessages();
            messageList.addEventListener('scroll', handleScroll);
        }

        // ==========================================
        // 滚动触顶加载更多
        // ==========================================
        function handleScroll() {
            const scrollTop = messageList.scrollTop;
            if (scrollTop <= 20 && !isLoadingMore && hasMoreMessages) {
                loadHistory(true);
            }
        }

        // ==========================================
        // 退出登录
        // ==========================================
        async function handleLogout() {
            await supabase.auth.signOut();
            if (window.chatChannel) {
                window.chatChannel.unsubscribe();
                window.chatChannel = null;
            }
            currentEmail = '';
            currentUserId = '';
            mainInterface.classList.add('hidden');
            loginOverlay.classList.remove('hidden');
            authMessage.textContent = '';
            messageList.innerHTML = '';
            sidebarUserEmail.textContent = '未登录';
            localStorage.removeItem('minichat_user');
            setAuthMessage('已退出', '');
            closeSettingsPanel();
            messageList.removeEventListener('scroll', handleScroll);
        }

        // ==========================================
        // 发送消息（直连 Supabase）
        // ==========================================
        async function sendMessageContent(content) {
            if (!currentEmail) {
                alert('请先登录');
                return;
            }
            // 乐观更新
            addMessageToBottom(content, currentEmail, true);

            try {
                const { error } = await supabase
                    .from('messages')
                    .insert({ content: content, sender_name: currentEmail });
                if (error) throw error;
                // 清空输入框（图片发送时不会清空，但文本会）
                if (chatInput.value) chatInput.value = '';
            } catch (err) {
                console.error('发送失败:', err);
                // 移除乐观消息
                if (messageList.lastChild) messageList.removeChild(messageList.lastChild);
                setAuthMessage('消息发送失败', 'error');
                setTimeout(() => {
                    if (authMessage.textContent === '消息发送失败') authMessage.textContent = '';
                }, 3000);
            }
        }

        // ==========================================
        // 图片压缩（同原来）
        // ==========================================
        function compressImage(file, maxWidth, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = height * (maxWidth / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob(function(blob) {
                            if (!blob) {
                                reject(new Error('压缩失败'));
                                return;
                            }
                            const compressed = new File([blob], file.name, {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            });
                            resolve(compressed);
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ==========================================
        // 图片上传
        // ==========================================
        attachBtn.addEventListener('click', function(e) {
            e.preventDefault();
            fileInput.click();
        });

        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                setAuthMessage('请选择图片文件', 'error');
                fileInput.value = '';
                return;
            }

            let processedFile = file;
            try {
                if (file.size > 200 * 1024) {
                    processedFile = await compressImage(file, 1080, 0.7);
                }
            } catch (err) {
                console.warn('压缩失败，使用原图', err);
                processedFile = file;
            }

            if (processedFile.size > 20 * 1024 * 1024) {
                setAuthMessage('图片不能超过 20MB', 'error');
                fileInput.value = '';
                return;
            }

            const tempId = 'uploading_' + Date.now();
            const tempDiv = document.createElement('div');
            tempDiv.id = tempId;
            tempDiv.className = 'message me';
            tempDiv.innerHTML = '<div class="sender">我</div><span style="opacity:0.6;">上传中…</span>';
            messageList.appendChild(tempDiv);
            messageList.scrollTop = messageList.scrollHeight;

            try {
                const fileExt = processedFile.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.${fileExt}`;
                const filePath = `public/${fileName}`;
                const { data, error } = await supabase.storage
                    .from('chat-images')
                    .upload(filePath, processedFile, { cacheControl: '3600', upsert: false });
                if (error) throw error;
                const { data: urlData } = supabase.storage
                    .from('chat-images')
                    .getPublicUrl(filePath);
                const publicURL = urlData.publicUrl;
                const tempEl = document.getElementById(tempId);
                if (tempEl) tempEl.remove();
                const content = `![image](${publicURL})`;
                await sendMessageContent(content);
            } catch (err) {
                console.error('上传失败:', err);
                const tempEl = document.getElementById(tempId);
                if (tempEl) tempEl.remove();
                setAuthMessage('图片上传失败，请重试', 'error');
                setTimeout(() => {
                    if (authMessage.textContent === '图片上传失败，请重试') authMessage.textContent = '';
                }, 3000);
            } finally {
                fileInput.value = '';
            }
        });

        // ==========================================
        // 订阅实时消息
        // ==========================================
        function subscribeMessages() {
            if (window.chatChannel) {
                window.chatChannel.unsubscribe();
                window.chatChannel = null;
            }
            const channel = supabase
                .channel('chat-room')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages'
                }, (payload) => {
                    try {
                        const msg = payload.new;
                        if (!msg) return;
                        const isMe = (msg.sender_name === currentEmail);
                        if (isMe) return;
                        addMessageToBottom(msg.content, msg.sender_name || '匿名', false, formatTime(msg.created_at));

                        if (document.hidden) {
                            unreadCount++;
                            document.title = `(${unreadCount}) MiniChat`;
                            if ('Notification' in window && Notification.permission === 'granted') {
                                const notification = new Notification('新消息', {
                                    body: `${msg.sender_name}: ${msg.content}`,
                                    icon: 'assets/logo.svg'
                                });
                                setTimeout(() => notification.close(), 5000);
                            }
                        }
                    } catch (e) {
                        console.error('处理实时消息失败', e);
                    }
                })
                .subscribe((status) => { /* console.log('channel status', status) */ });
            window.chatChannel = channel;
        }

        // ==========================================
        // 页面可见性变化
        // ==========================================
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                unreadCount = 0;
                document.title = 'MiniChat';
            }
        });

        // ==========================================
        // 事件绑定
        // ==========================================
        btnLogin.addEventListener('click', handleAuth);
        // 切换模式
        document.getElementById('switchToSignup').addEventListener('click', () => switchMode('signup'));
        // 密码显示切换
        togglePwd.addEventListener('click', function() {
            const type = authPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            authPassword.setAttribute('type', type);
            this.textContent = type === 'password' ? '显示' : '隐藏';
        });

        if (chatInput) {
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    const content = this.value.trim();
                    if (content) sendMessageContent(content);
                }
            });
        }
        btnSend.addEventListener('click', function() {
            const content = chatInput.value.trim();
            if (content) sendMessageContent(content);
        });

        if (settingsNav) settingsNav.addEventListener('click', openSettings);
        if (closeSettings) closeSettings.addEventListener('click', closeSettingsPanel);
        if (settingsOverlay) {
            settingsOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeSettingsPanel();
            });
        }
        if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
        if (settingsLogout) settingsLogout.addEventListener('click', handleLogout);

        // ==========================================
        // Splash 控制
        // ==========================================
        (function() {
            const SPLASH_DURATION = 2600;
            const splash = document.getElementById('splash');
            const fill = document.getElementById('splashFill');

    function hideSplash() {
        if (!splash) return;
        splash.classList.add('hidden');
        setTimeout(() => {
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
        }, 420);
        
        // ★ 先确保登录界面显示（防止空白）
        loginOverlay.classList.remove('hidden');
        
        // 然后尝试恢复 session（静默处理）
        const raw = localStorage.getItem('minichat_user');
        if (raw) {
            try {
                const u = JSON.parse(raw);
                if (u && u.email) {
                    currentEmail = u.email;
                    currentUserId = u.id || '';
                    // 异步检查 session，有效则自动进入聊天
                    supabase.auth.getSession().then(({ data, error }) => {
                        if (data.session) {
                            enterChat(); // 会隐藏登录界面并显示主界面
                        }
                        // 如果 session 无效，什么都不做，保留登录界面
                    }).catch(() => {
                        // 出错也什么都不做，保留登录界面
                    });
                    return;
                }
            } catch (e) { /* ignore */ }
        }
                loginOverlay.classList.remove('hidden');
            }

            document.addEventListener('DOMContentLoaded', function() {
                if (fill) {
                    fill.style.width = '0%';
                    void fill.offsetWidth;
                    fill.style.transition = 'width ' + SPLASH_DURATION + 'ms linear';
                    fill.style.width = '100%';
                }
                setTimeout(hideSplash, SPLASH_DURATION + 120);
            });
        })();

        loadTheme();
        console.log('MiniChat 已迁移到 Supabase Auth (方案A)');
    </script>
</body>
</html>
