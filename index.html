<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/svg" href="assets/logo.svg" />
    <title>MiniChat</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
    </script>

    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ===== 主容器 ===== */
        .app-container {
            width: 100%;
            max-width: 560px;
            height: 90vh;
            max-height: 800px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: height 0.2s ease;
        }

        /* ===== 顶栏 ===== */
        .topbar {
            padding: 16px 24px;
            background: #ffffff;
            border-bottom: 1px solid #e9edf2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-left .logo {
            height: 32px;
            width: auto;
            display: block;
        }

        .topbar-left .app-name {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: -0.3px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topbar-right .user-email {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
        }

        .topbar-right .logout-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar-right .logout-btn:hover {
            background: #f1f5f9;
            color: #1e293b;
        }

        .topbar-right .logout-btn img {
            height: 16px;
            width: 16px;
            opacity: 0.6;
        }
        .topbar-right .logout-btn:hover img {
            opacity: 0.9;
        }

        /* ===== 登录区域 ===== */
        .auth-section {
            padding: 40px 32px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .auth-section .auth-title {
            font-size: 24px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .auth-section .auth-sub {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 12px;
        }

        .auth-section input {
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            background: #f8fafc;
            font-size: 15px;
            color: #0f172a;
            outline: none;
            transition: 0.2s;
            width: 100%;
        }
        .auth-section input:focus {
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .auth-section .code-row {
            display: flex;
            gap: 12px;
        }
        .auth-section .code-row input {
            flex: 1;
        }
        .auth-section .code-row .btn {
            flex-shrink: 0;
            padding: 14px 20px;
            background: #f1f5f9;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-weight: 500;
            color: #1e293b;
            transition: 0.2s;
            cursor: pointer;
        }
        .auth-section .code-row .btn:hover {
            background: #e9edf2;
        }
        .auth-section .code-row .btn:active {
            transform: scale(0.97);
        }

        .auth-section .btn-primary {
            padding: 14px;
            background: #3b82f6;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .auth-section .btn-primary:hover {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .auth-section .btn-primary:active {
            transform: scale(0.98);
        }
        .auth-section .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-message {
            font-size: 13px;
            text-align: center;
            min-height: 20px;
            padding: 4px 0;
        }
        .auth-message.success {
            color: #16a34a;
        }
        .auth-message.error {
            color: #dc2626;
        }

        /* ===== 聊天区域 ===== */
        .chat-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: #fafbfc;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeIn 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        .message.me {
            align-self: flex-end;
            background: #3b82f6;
            color: #ffffff;
            border-bottom-right-radius: 6px;
        }
        .message.other {
            align-self: flex-start;
            background: #ffffff;
            color: #1e293b;
            border-bottom-left-radius: 6px;
            border: 1px solid #e9edf2;
        }
        .message .sender {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .message.me .sender {
            color: rgba(255,255,255,0.8);
        }
        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 6px;
            text-align: right;
        }
        .message img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            display: block;
            margin-top: 6px;
            cursor: pointer;
            border: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 输入区 ===== */
        .input-area {
            padding: 12px 24px 20px 24px;
            background: #ffffff;
            border-top: 1px solid #e9edf2;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .input-area .attach-btn {
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            transition: 0.2s;
        }
        .input-area .attach-btn:hover {
            background: #f1f5f9;
        }
        .input-area .attach-btn img {
            height: 24px;
            width: 24px;
            opacity: 0.6;
        }
        .input-area .attach-btn:hover img {
            opacity: 0.9;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1.5px solid #e2e8f0;
            background: #f8fafc;
            font-size: 15px;
            color: #0f172a;
            outline: none;
            transition: 0.2s;
        }
        .input-area input[type="text"]:focus {
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        .input-area .send-btn {
            background: #3b82f6;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .input-area .send-btn:hover {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .input-area .send-btn:active {
            transform: scale(0.94);
        }
        .input-area .send-btn img {
            height: 22px;
            width: 22px;
            filter: brightness(0) invert(1);
        }

        /* ===== 通用隐藏 ===== */
        .hidden {
            display: none !important;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            body { padding: 8px; }
            .app-container {
                max-height: 98vh;
                border-radius: 20px;
            }
            .topbar { padding: 12px 16px; }
            .topbar-left .app-name { font-size: 16px; }
            .topbar-left .logo { height: 28px; }
            .auth-section { padding: 24px 20px; }
            .auth-section .auth-title { font-size: 20px; }
            .chat-area { padding: 16px; }
            .message { max-width: 88%; }
            .input-area { padding: 10px 16px 16px 16px; gap: 8px; }
            .input-area input[type="text"] { padding: 10px 14px; font-size: 16px; }
            .input-area .send-btn { width: 44px; height: 44px; }
            .input-area .send-btn img { height: 20px; width: 20px; }
            .input-area .attach-btn img { height: 22px; width: 22px; }
            .topbar-right .user-email { font-size: 12px; }
        }

        @media (min-width: 768px) {
            .app-container { max-width: 640px; }
        }
    </style>
</head>

<body>

    <div class="app-container" id="app">

        <!-- ===== 顶栏 ===== -->
        <div class="topbar">
            <div class="topbar-left">
                <!-- 图标从本地文件加载，请替换路径 -->
                <img class="logo" src="assets/logo.svg" alt="Logo" onerror="this.style.display='none'" />
                <span class="app-name">MiniChat</span>
            </div>
            <div class="topbar-right" id="topbarRight">
                <span class="user-email" id="currentUserDisplay">未登录</span>
                <button class="logout-btn" id="btnLogout">
                    <!-- 可选退出图标 -->
                    <img src="assets/logout.svg" alt="" onerror="this.style.display='none'" />
                    退出
                </button>
            </div>
        </div>

        <!-- ===== 登录区域 ===== -->
        <div class="auth-section" id="authSection">
            <div>
                <div class="auth-title">欢迎回来</div>
                <div class="auth-sub">输入邮箱，获取验证码即可登录</div>
            </div>
            <input type="email" id="authEmail" placeholder="电子邮箱" />
            <div class="code-row">
                <input type="text" id="authCode" placeholder="6位验证码" maxlength="6" />
                <button class="btn" id="btnSendCode">获取验证码</button>
            </div>
            <button class="btn-primary" id="btnLogin">登录 / 注册</button>
            <div class="auth-message" id="authMessage"></div>
        </div>

        <!-- ===== 聊天区域 ===== -->
        <div class="chat-section hidden" id="chatSection">
            <div class="chat-area" id="messageList"></div>
            <div class="input-area">
                <label class="attach-btn" title="发送图片">
                    <!-- 附件图标 -->
                    <img src="assets/attach.svg" alt="附件" onerror="this.style.display='none'" />
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" />
                </label>
                <input type="text" id="chatInput" placeholder="输入消息…" />
                <button class="send-btn" id="btnSend">
                    <!-- 发送图标 -->
                    <img src="assets/send.svg" alt="发送" onerror="this.style.display='none'" />
                </button>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. 配置
        // ==========================================
        const SUPABASE_URL = 'https://xgugltiuszrpmbxjmqfv.supabase.co';
        const SUPABASE_ANON_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhndWdsdGl1c3pycG1ieGptcWZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODE2MTUsImV4cCI6MjA5ODA1NzYxNX0.nWiJm_7Fh3-6MUdazhW7CwOAi8w2PVMsDbfhUNyUIsM';

        const WEBHOOK_AUTH = 'https://hook.us2.make.com/7bwoxm0lr1adzqy12jcq4xjk0hkugl2n';
        const WEBHOOK_SEND_MESSAGE = 'https://hook.us2.make.com/9csv6ub93wvhcm4wdmpzdccyeqbsqd5q';

        // ==========================================
        // 2. 初始化 Supabase
        // ==========================================
        if (!window.supabaseClient) {
            window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // ==========================================
        // 3. 状态 & DOM
        // ==========================================
        let currentEmail = '';
        let isCodeSending = false;

        const authSection = document.getElementById('authSection');
        const chatSection = document.getElementById('chatSection');
        const authEmail = document.getElementById('authEmail');
        const authCode = document.getElementById('authCode');
        const authMessage = document.getElementById('authMessage');
        const messageList = document.getElementById('messageList');
        const chatInput = document.getElementById('chatInput');
        const currentUserDisplay = document.getElementById('currentUserDisplay');
        const btnSendCode = document.getElementById('btnSendCode');
        const btnLogin = document.getElementById('btnLogin');
        const btnSend = document.getElementById('btnSend');
        const btnLogout = document.getElementById('btnLogout');
        const fileInput = document.getElementById('fileInput');

        // ==========================================
        // 4. 工具函数
        // ==========================================
        function formatTime(iso) {
            const d = new Date(iso);
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function setAuthMessage(msg, type) {
            authMessage.textContent = msg;
            authMessage.className = 'auth-message';
            if (type === 'success') authMessage.classList.add('success');
            if (type === 'error') authMessage.classList.add('error');
        }

        // 图片预览与下载（无 emoji）
        window.previewImage = function(url) {
            const overlay = document.createElement('div');
            overlay.style.cssText =
                'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:20px;box-sizing:border-box;touch-action:manipulation;';

            const img = document.createElement('img');
            img.src = url;
            img.style.cssText =
                'max-width:100%;max-height:70%;object-fit:contain;border-radius:12px;margin-bottom:24px;box-shadow:0 10px 30px rgba(0,0,0,0.3);';

            const btnContainer = document.createElement('div');
            btnContainer.style.cssText = 'display:flex;gap:16px;flex-wrap:wrap;justify-content:center;';

            const downloadBtn = document.createElement('button');
            downloadBtn.textContent = '下载图片';
            downloadBtn.style.cssText =
                'padding:12px 28px;border:none;border-radius:10px;background:#3b82f6;color:#fff;font-size:15px;font-weight:500;cursor:pointer;touch-action:manipulation;box-shadow:0 4px 12px rgba(59,130,246,0.3);min-height:44px;min-width:100px;';
            downloadBtn.onclick = function(e) {
                e.stopPropagation();
                downloadBtn.textContent = '下载中…';
                downloadBtn.disabled = true;
                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error('下载失败');
                        return res.blob();
                    })
                    .then(blob => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        const filename = url.split('/').pop().split('?')[0] || 'image.jpg';
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        URL.revokeObjectURL(a.href);
                        downloadBtn.textContent = '已下载';
                        setTimeout(() => {
                            downloadBtn.textContent = '下载图片';
                            downloadBtn.disabled = false;
                        }, 2000);
                    })
                    .catch(err => {
                        console.error('下载失败:', err);
                        downloadBtn.textContent = '下载失败';
                        setTimeout(() => {
                            downloadBtn.textContent = '下载图片';
                            downloadBtn.disabled = false;
                        }, 2000);
                    });
            };

            const closeBtn = document.createElement('button');
            closeBtn.textContent = '关闭';
            closeBtn.style.cssText =
                'padding:12px 28px;border:none;border-radius:10px;background:rgba(255,255,255,0.2);color:#fff;font-size:15px;font-weight:500;cursor:pointer;touch-action:manipulation;min-height:44px;min-width:100px;';
            closeBtn.onclick = function(e) {
                e.stopPropagation();
                document.body.removeChild(overlay);
            };

            btnContainer.appendChild(downloadBtn);
            btnContainer.appendChild(closeBtn);

            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    document.body.removeChild(overlay);
                }
            });

            overlay.appendChild(img);
            overlay.appendChild(btnContainer);
            document.body.appendChild(overlay);
        };

        // 添加消息
        function addMessage(content, sender, isMe, time) {
            const div = document.createElement('div');
            div.className = 'message ' + (isMe ? 'me' : 'other');

            if (!content) content = '';

            const imageMatch = content.match(/!\[image\]\((.*?)\)/);
            let displayContent = content;
            if (imageMatch) {
                const url = imageMatch[1];
                displayContent =
                    `<img src="${url}" onclick="window.previewImage && window.previewImage('${url}')" alt="图片" loading="lazy" />`;
            } else {
                displayContent = content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            div.innerHTML = '<div class="sender">' + sender + '</div>' + displayContent +
                '<div class="time">' + (time || formatTime(new Date().toISOString())) + '</div>';
            messageList.appendChild(div);
            messageList.scrollTop = messageList.scrollHeight;
        }

        function setLoading(loading) {
            btnSendCode.disabled = loading;
            btnLogin.disabled = loading;
            btnSendCode.style.opacity = loading ? '0.6' : '1';
            btnLogin.style.opacity = loading ? '0.6' : '1';
        }

        // ==========================================
        // 5. 发送验证码
        // ==========================================
        window.handleSendCode = async function() {
            const email = authEmail.value.trim();
            if (!email || !email.includes('@')) {
                setAuthMessage('请输入有效的邮箱地址', 'error');
                return;
            }
            if (isCodeSending) return;
            isCodeSending = true;
            setLoading(true);
            setAuthMessage('正在发送…', '');

            try {
                const res = await fetch(WEBHOOK_AUTH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'send', email })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    setAuthMessage('验证码已发送，请查收邮件', 'success');
                    authCode.focus();
                } else {
                    setAuthMessage(result.message || '发送失败', 'error');
                }
            } catch (err) {
                console.error(err);
                setAuthMessage('网络错误，请重试', 'error');
            } finally {
                isCodeSending = false;
                setLoading(false);
            }
        };

        // ==========================================
        // 6. 验证码登录
        // ==========================================
        window.handleLogin = async function() {
            const email = authEmail.value.trim();
            const code = authCode.value.trim();
            if (!email) { setAuthMessage('请输入邮箱', 'error'); return; }
            if (!code || code.length !== 6) { setAuthMessage('请输入6位验证码', 'error'); return; }

            setLoading(true);
            setAuthMessage('登录中…', '');

            try {
                const res = await fetch(WEBHOOK_AUTH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'verify', email, inputCode: code })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    currentEmail = email;
                    setAuthMessage('登录成功', 'success');
                    enterChat();
                } else {
                    setAuthMessage(result.message || '验证码错误', 'error');
                }
            } catch (err) {
                console.error(err);
                setAuthMessage('网络错误', 'error');
            } finally {
                setLoading(false);
            }
        };

        // ==========================================
        // 7. 进入聊天
        // ==========================================
        function enterChat() {
            authSection.classList.add('hidden');
            chatSection.classList.remove('hidden');
            currentUserDisplay.textContent = currentEmail;
            messageList.innerHTML = '';
            localStorage.setItem('minichat_user', JSON.stringify({ email: currentEmail }));
            subscribeMessages();
            loadHistory();
        }

        // ==========================================
        // 8. 退出登录
        // ==========================================
        window.handleLogout = function() {
            if (window.chatChannel) {
                window.chatChannel.unsubscribe();
                window.chatChannel = null;
            }
            currentEmail = '';
            chatSection.classList.add('hidden');
            authSection.classList.remove('hidden');
            authMessage.textContent = '';
            messageList.innerHTML = '';
            authCode.value = '';
            currentUserDisplay.textContent = '未登录';
            localStorage.removeItem('minichat_user');
            setAuthMessage('已退出', '');
        };

        // ==========================================
        // 9. 发送消息核心
        // ==========================================
        async function sendMessageContent(content) {
            if (!currentEmail) {
                alert('请先登录');
                return;
            }
            addMessage(content, '我', true);

            try {
                const res = await fetch(WEBHOOK_SEND_MESSAGE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, sender_name: currentEmail })
                });
                if (!res.ok) throw new Error('发送失败');
                if (chatInput.value) chatInput.value = '';
            } catch (err) {
                console.error(err);
                if (messageList.lastChild) messageList.removeChild(messageList.lastChild);
                setAuthMessage('消息发送失败', 'error');
                setTimeout(() => {
                    if (authMessage.textContent === '消息发送失败') authMessage.textContent = '';
                }, 3000);
            }
        }

        // ==========================================
        // 10. 发送文本
        // ==========================================
        window.sendMessageHandler = async function() {
            const content = chatInput.value.trim();
            if (!content) return;
            await sendMessageContent(content);
        };

        // ==========================================
        // 11. 发送图片
        // ==========================================
        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                setAuthMessage('请选择图片文件', 'error');
                fileInput.value = '';
                return;
            }
            if (file.size > 20 * 1024 * 1024) {
                setAuthMessage('图片不能超过 20MB', 'error');
                fileInput.value = '';
                return;
            }

            const tempId = 'uploading_' + Date.now();
            const tempDiv = document.createElement('div');
            tempDiv.id = tempId;
            tempDiv.className = 'message me';
            tempDiv.innerHTML = '<div class="sender">我</div><span style="opacity:0.6;">上传中…</span>';
            messageList.appendChild(tempDiv);
            messageList.scrollTop = messageList.scrollHeight;

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.${fileExt}`;
                const filePath = `public/${fileName}`;

                const { data, error } = await window.supabaseClient.storage
                    .from('chat-images')
                    .upload(filePath, file, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (error) throw error;

                const { data: urlData } = window.supabaseClient.storage
                    .from('chat-images')
                    .getPublicUrl(filePath);
                const publicURL = urlData.publicUrl;

                const tempEl = document.getElementById(tempId);
                if (tempEl) tempEl.remove();

                const content = `![image](${publicURL})`;
                await sendMessageContent(content);
            } catch (err) {
                console.error('上传失败:', err);
                const tempEl = document.getElementById(tempId);
                if (tempEl) tempEl.remove();
                setAuthMessage('图片上传失败，请重试', 'error');
                setTimeout(() => {
                    if (authMessage.textContent === '图片上传失败，请重试') authMessage.textContent = '';
                }, 3000);
            } finally {
                fileInput.value = '';
            }
        });

        // ==========================================
        // 12. 加载历史
        // ==========================================
        async function loadHistory() {
            try {
                const { data, error } = await window.supabaseClient
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: true })
                    .limit(50);
                if (error) throw error;
                messageList.innerHTML = '';
                data.forEach(msg => {
                    const isMe = msg.sender_name === currentEmail;
                    addMessage(msg.content, msg.sender_name || '匿名', isMe, formatTime(msg.created_at));
                });
            } catch (err) {
                console.error('加载历史消息失败:', err);
            }
        }

        // ==========================================
        // 13. 订阅实时
        // ==========================================
        function subscribeMessages() {
            if (window.chatChannel) {
                window.chatChannel.unsubscribe();
                window.chatChannel = null;
            }
            const channel = window.supabaseClient
                .channel('chat-room')
                .on(
                    'postgres_changes', {
                        event: 'INSERT',
                        schema: 'public',
                        table: 'messages'
                    },
                    (payload) => {
                        const msg = payload.new;
                        const lastMsg = messageList.lastChild;
                        if (lastMsg && lastMsg.textContent.includes(msg.content) && msg.sender_name === currentEmail)
                            return;
                        const isMe = msg.sender_name === currentEmail;
                        addMessage(msg.content, msg.sender_name || '匿名', isMe, formatTime(msg.created_at));
                    }
                )
                .subscribe(status => {
                    if (status === 'SUBSCRIBED') console.log('✅ 已连接到实时频道！');
                });
            window.chatChannel = channel;
        }

        // ==========================================
        // 14. 检查本地会话
        // ==========================================
        function checkStoredSession() {
            const stored = localStorage.getItem('minichat_user');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    if (data.email) {
                        currentEmail = data.email;
                        enterChat();
                        return true;
                    }
                } catch (e) { /* ignore */ }
            }
            return false;
        }

        // ==========================================
        // 15. 绑定事件
        // ==========================================
        btnSendCode.addEventListener('click', window.handleSendCode);
        btnLogin.addEventListener('click', window.handleLogin);
        btnSend.addEventListener('click', window.sendMessageHandler);
        btnLogout.addEventListener('click', window.handleLogout);

        // 点击附件按钮触发文件选择
        document.querySelector('.attach-btn')?.addEventListener('click', function(e) {
            e.preventDefault();
            fileInput.click();
        });

        authCode.addEventListener('keydown', e => { if (e.key === 'Enter') window.handleLogin(); });
        authEmail.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                authCode.value ? window.handleLogin() : window.handleSendCode();
            }
        });
        chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') window.sendMessageHandler(); });

        // ==========================================
        // 16. 启动
        // ==========================================
        if (!checkStoredSession()) {
            console.log('MiniChat 已启动，请登录');
        }
        console.log('Auth Webhook:', WEBHOOK_AUTH);
        console.log('Send Message Webhook:', WEBHOOK_SEND_MESSAGE);
    </script>

</body>
</html>
