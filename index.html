<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MiniChat</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
    </script>

    <style>
        /* ===== 全局样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* ===== 容器（响应式基座） ===== */
        .container {
            width: 420px;
            max-width: 92vw;
            max-height: 96vh;
            background: #1a1a2e;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.2s ease;
        }

        /* ===== 标题 ===== */
        .header {
            text-align: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a2a4a;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7, #00b894);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ===== 登录区域 ===== */
        .auth-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .auth-section input {
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: #252540;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .auth-section input:focus {
            background: #2f2f55;
            box-shadow: 0 0 0 2px #6c5ce7;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            touch-action: manipulation;
            user-select: none;
        }
        .btn-primary {
            background: #6c5ce7;
            color: #fff;
        }
        .btn-primary:hover {
            background: #5a4bd1;
            transform: scale(1.02);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-success {
            background: #00b894;
            color: #fff;
        }
        .btn-success:hover {
            background: #00a381;
            transform: scale(1.02);
        }
        .btn-success:active {
            transform: scale(0.97);
        }
        .btn-danger {
            background: #e17055;
            color: #fff;
        }
        .btn-danger:hover {
            background: #d63031;
        }
        .btn-outline {
            background: transparent;
            color: #a0a0c0;
            border: 1px solid #3a3a5a;
        }
        .btn-outline:hover {
            background: #2a2a4a;
        }
        .btn-sm {
            padding: 8px 14px;
            font-size: 12px;
        }
        .btn-icon {
            padding: 12px 16px;
            font-size: 18px;
            line-height: 1;
        }

        .code-row {
            display: flex;
            gap: 10px;
        }
        .code-row input {
            flex: 1;
        }
        .code-row .btn {
            flex-shrink: 0;
        }

        .auth-message {
            font-size: 13px;
            text-align: center;
            min-height: 20px;
            padding: 4px 0;
        }
        .auth-message.success {
            color: #00b894;
        }
        .auth-message.error {
            color: #e17055;
        }

        .hidden {
            display: none !important;
        }

        /* ===== 聊天区域 ===== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            background: #12121f;
            border-radius: 12px;
            padding: 16px;
            min-height: 300px;
            max-height: 400px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #3a3a5a;
            border-radius: 10px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 14px;
            max-width: 80%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
            animation: fadeIn 0.2s ease;
        }
        .message.me {
            align-self: flex-end;
            background: #6c5ce7;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start;
            background: #252540;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        .message .sender {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.6;
            margin-bottom: 2px;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.4;
            margin-top: 4px;
            text-align: right;
        }
        .message img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            display: block;
            margin-top: 4px;
            cursor: pointer;
            touch-action: manipulation;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 输入区 ===== */
        .input-area {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }
        .input-area input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: #252540;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .input-area input[type="text"]:focus {
            background: #2f2f55;
            box-shadow: 0 0 0 2px #6c5ce7;
        }
        .input-area .btn {
            flex-shrink: 0;
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #666688;
            padding-top: 12px;
            border-top: 1px solid #1e1e32;
            margin-top: 12px;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 6px;
        }
        .status-bar .online {
            color: #00b894;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* ==========================================
           全平台响应式适配
           ========================================== */

        /* --- 小屏手机 (< 480px) --- */
        @media (max-width: 480px) {
            body {
                padding: 8px;
                align-items: flex-start;
            }
            .container {
                width: 100%;
                max-width: 100%;
                max-height: 98vh;
                border-radius: 16px;
                padding: 16px;
                margin: 0;
            }
            .header h1 {
                font-size: 20px;
            }
            .auth-section input,
            .auth-section .btn {
                font-size: 16px;
                padding: 14px 16px;
                min-height: 48px;
            }
            .code-row {
                flex-wrap: wrap;
            }
            .code-row input {
                flex: 1;
                min-width: 120px;
            }
            .code-row .btn {
                flex: 1;
                min-width: 100px;
            }
            .chat-area {
                min-height: 200px;
                max-height: 55vh;
                padding: 12px;
            }
            .message {
                max-width: 85%;
                font-size: 15px;
                padding: 10px 14px;
            }
            .message .sender {
                font-size: 11px;
            }
            .message .time {
                font-size: 10px;
            }
            .message img {
                max-width: 180px;
                max-height: 180px;
            }
            .input-area {
                gap: 8px;
                flex-wrap: wrap;
            }
            .input-area input[type="text"] {
                font-size: 16px;
                padding: 14px 16px;
                min-height: 48px;
                flex: 1;
                min-width: 150px;
            }
            .input-area .btn {
                font-size: 15px;
                padding: 14px 16px;
                min-height: 48px;
                min-width: 60px;
            }
            .btn-icon {
                font-size: 22px;
                padding: 12px 16px;
                min-height: 48px;
                min-width: 48px;
            }
            .status-bar {
                font-size: 12px;
                padding-top: 10px;
                margin-top: 10px;
            }
            .status-bar .btn-sm {
                padding: 6px 14px;
                font-size: 12px;
                min-height: 36px;
            }
            /* 预览模态框 */
            [style*="position: fixed"] button {
                min-height: 52px !important;
                font-size: 17px !important;
                padding: 16px 24px !important;
                min-width: 120px !important;
            }
            [style*="position: fixed"] img {
                max-height: 55vh !important;
            }
        }

        /* --- 中屏手机/小平板 (481px - 768px) --- */
        @media (min-width: 481px) and (max-width: 768px) {
            body {
                padding: 12px;
            }
            .container {
                width: 100%;
                max-width: 480px;
                padding: 20px;
            }
            .message img {
                max-width: 200px;
                max-height: 200px;
            }
        }

        /* --- 大屏手机/小平板 (769px - 1024px) --- */
        @media (min-width: 769px) and (max-width: 1024px) {
            body {
                padding: 20px;
            }
            .container {
                width: 90%;
                max-width: 560px;
                padding: 24px;
            }
        }

        /* --- 桌面端 (1025px - 1400px) --- */
        @media (min-width: 1025px) and (max-width: 1400px) {
            .container {
                width: 480px;
                padding: 28px;
            }
            .header h1 {
                font-size: 26px;
            }
            .auth-section input,
            .auth-section .btn,
            .input-area input[type="text"],
            .input-area .btn {
                font-size: 15px;
                padding: 14px 20px;
            }
            .message {
                font-size: 15px;
                padding: 12px 16px;
            }
            .chat-area {
                min-height: 350px;
                max-height: 450px;
            }
        }

        /* --- 大屏桌面 (> 1400px) --- */
        @media (min-width: 1401px) {
            .container {
                width: 560px;
                padding: 32px;
                border-radius: 28px;
            }
            .header h1 {
                font-size: 30px;
            }
            .auth-section input,
            .auth-section .btn,
            .input-area input[type="text"],
            .input-area .btn {
                font-size: 16px;
                padding: 16px 24px;
            }
            .message {
                font-size: 16px;
                padding: 14px 18px;
                max-width: 75%;
            }
            .message img {
                max-width: 280px;
                max-height: 280px;
            }
            .chat-area {
                min-height: 400px;
                max-height: 500px;
                padding: 20px;
            }
            .status-bar {
                font-size: 14px;
                padding-top: 16px;
                margin-top: 16px;
            }
            .btn-icon {
                font-size: 24px;
                padding: 16px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container" id="app">
        <div class="header">
            <h1>💬 MiniChat</h1>
        </div>

        <!-- ===== 登录区域 ===== -->
        <div class="auth-section" id="authSection">
            <input type="email" id="authEmail" placeholder="请输入邮箱地址" />
            <div class="code-row">
                <input type="text" id="authCode" placeholder="6位验证码" maxlength="6" />
                <button class="btn btn-primary" id="btnSendCode">发送验证码</button>
            </div>
            <button class="btn btn-success" id="btnLogin">登录 / 注册</button>
            <div class="auth-message" id="authMessage"></div>
        </div>

        <!-- ===== 聊天区域 ===== -->
        <div id="chatSection" class="hidden">
            <div class="chat-area" id="messageList"></div>
            <div class="input-area">
                <input type="text" id="chatInput" placeholder="输入消息..." />
                <label for="fileInput" class="btn btn-outline btn-icon" title="发送图片">📎</label>
                <input type="file" id="fileInput" accept="image/*" style="display:none;" />
                <button class="btn btn-primary" id="btnSend">发送</button>
            </div>
            <div class="status-bar">
                <span>👤 <span id="currentUser">未登录</span></span>
                <span class="online">● 在线</span>
                <button class="btn btn-danger btn-sm" id="btnLogout">退出</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 配置
        // ==========================================
        const SUPABASE_URL = 'https://xgugltiuszrpmbxjmqfv.supabase.co';
        const SUPABASE_ANON_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhndWdsdGl1c3pycG1ieGptcWZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODE2MTUsImV4cCI6MjA5ODA1NzYxNX0.nWiJm_7Fh3-6MUdazhW7CwOAi8w2PVMsDbfhUNyUIsM';

        const WEBHOOK_AUTH = 'https://hook.us2.make.com/7bwoxm0lr1adzqy12jcq4xjk0hkugl2n';
        const WEBHOOK_SEND_MESSAGE = 'https://hook.us2.make.com/9csv6ub93wvhcm4wdmpzdccyeqbsqd5q';

        // ==========================================
        // 2. 初始化 Supabase
        // ==========================================
        if (!window.supabaseClient) {
            window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // ==========================================
        // 3. 状态与 DOM
        // ==========================================
        let currentEmail = '';
        let isCodeSending = false;

        const authSection = document.getElementById('authSection');
        const chatSection = document.getElementById('chatSection');
        const authEmail = document.getElementById('authEmail');
        const authCode = document.getElementById('authCode');
        const authMessage = document.getElementById('authMessage');
        const messageList = document.getElementById('messageList');
        const chatInput = document.getElementById('chatInput');
        const currentUserSpan = document.getElementById('currentUser');
        const btnSendCode = document.getElementById('btnSendCode');
        const btnLogin = document.getElementById('btnLogin');
        const btnSend = document.getElementById('btnSend');
        const btnLogout = document.getElementById('btnLogout');
        const fileInput = document.getElementById('fileInput');

        // ==========================================
        // 4. 工具函数
        // ==========================================
        function formatTime(iso) {
            const d = new Date(iso);
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function setAuthMessage(msg, type) {
            authMessage.textContent = msg;
            authMessage.className = 'auth-message';
            if (type === 'success') authMessage.classList.add('success');
            if (type === 'error') authMessage.classList.add('error');
        }

        // 图片预览与下载
        window.previewImage = function(url) {
            const overlay = document.createElement('div');
            overlay.style.cssText =
                'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:20px;box-sizing:border-box;touch-action:manipulation;';

            const img = document.createElement('img');
            img.src = url;
            img.style.cssText =
                'max-width:100%;max-height:70%;object-fit:contain;border-radius:12px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.6);';

            const btnContainer = document.createElement('div');
            btnContainer.style.cssText =
                'display:flex;gap:15px;flex-wrap:wrap;justify-content:center;';

            const downloadBtn = document.createElement('button');
            downloadBtn.textContent = '⬇️ 下载图片';
            downloadBtn.style.cssText =
                'padding:14px 28px;border:none;border-radius:12px;background:#6c5ce7;color:#fff;font-size:16px;font-weight:600;cursor:pointer;touch-action:manipulation;box-shadow:0 4px 15px rgba(108,92,231,0.4);min-height:48px;min-width:120px;';
            downloadBtn.onclick = function(e) {
                e.stopPropagation();
                downloadBtn.textContent = '⏳ 下载中...';
                downloadBtn.disabled = true;
                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error('下载失败');
                        return res.blob();
                    })
                    .then(blob => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        const filename = url.split('/').pop().split('?')[0] || 'image.jpg';
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        URL.revokeObjectURL(a.href);
                        downloadBtn.textContent = '✅ 已下载';
                        setTimeout(() => {
                            downloadBtn.textContent = '⬇️ 下载图片';
                            downloadBtn.disabled = false;
                        }, 2000);
                    })
                    .catch(err => {
                        console.error('下载失败:', err);
                        downloadBtn.textContent = '❌ 下载失败';
                        setTimeout(() => {
                            downloadBtn.textContent = '⬇️ 下载图片';
                            downloadBtn.disabled = false;
                        }, 2000);
                    });
            };

            const closeBtn = document.createElement('button');
            closeBtn.textContent = '✕ 关闭';
            closeBtn.style.cssText =
                'padding:14px 28px;border:none;border-radius:12px;background:rgba(255,255,255,0.15);color:#fff;font-size:16px;font-weight:600;cursor:pointer;touch-action:manipulation;min-height:48px;min-width:120px;';
            closeBtn.onclick = function(e) {
                e.stopPropagation();
                document.body.removeChild(overlay);
            };

            btnContainer.appendChild(downloadBtn);
            btnContainer.appendChild(closeBtn);

            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    document.body.removeChild(overlay);
                }
            });

            overlay.appendChild(img);
            overlay.appendChild(btnContainer);
            document.body.appendChild(overlay);
        };

        // 添加消息
        function addMessage(content, sender, isMe, time) {
            const div = document.createElement('div');
            div.className = 'message ' + (isMe ? 'me' : 'other');

            if (!content) content = '';

            const imageMatch = content.match(/!\[image\]\((.*?)\)/);
            let displayContent = content;
            if (imageMatch) {
                const url = imageMatch[1];
                displayContent =
                    `<img src="${url}" data-url="${url}" onclick="window.previewImage && window.previewImage('${url}')" alt="图片" loading="lazy" />`;
            } else {
                displayContent = content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            div.innerHTML = '<div class="sender">' + sender + '</div>' + displayContent +
                '<div class="time">' + (time || formatTime(new Date().toISOString())) + '</div>';
            messageList.appendChild(div);
            messageList.scrollTop = messageList.scrollHeight;
        }

        function setLoading(loading) {
            btnSendCode.disabled = loading;
            btnLogin.disabled = loading;
            btnSendCode.classList.toggle('loading', loading);
            btnLogin.classList.toggle('loading', loading);
        }

        // ==========================================
        // 5. 发送验证码
        // ==========================================
        window.handleSendCode = async function() {
            const email = authEmail.value.trim();
            if (!email || !email.includes('@')) {
                setAuthMessage('请输入有效的邮箱地址', 'error');
                return;
            }
            if (isCodeSending) return;
            isCodeSending = true;
            setLoading(true);
            setAuthMessage('正在发送...', '');

            try {
                const res = await fetch(WEBHOOK_AUTH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'send', email })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    setAuthMessage('✅ 验证码已发送，请查收邮件', 'success');
                    authCode.focus();
                } else {
                    setAuthMessage('❌ ' + (result.message || '发送失败'), 'error');
                }
            } catch (err) {
                console.error(err);
                setAuthMessage('❌ 网络错误，请重试', 'error');
            } finally {
                isCodeSending = false;
                setLoading(false);
            }
        };

        // ==========================================
        // 6. 验证码登录
        // ==========================================
        window.handleLogin = async function() {
            const email = authEmail.value.trim();
            const code = authCode.value.trim();
            if (!email) { setAuthMessage('请输入邮箱', 'error'); return; }
            if (!code || code.length !== 6) { setAuthMessage('请输入6位验证码', 'error'); return; }

            setLoading(true);
            setAuthMessage('登录中...', '');

            try {
                const res = await fetch(WEBHOOK_AUTH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'verify', email, inputCode: code })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    currentEmail = email;
                    setAuthMessage('✅ 登录成功！', 'success');
                    enterChat();
                } else {
                    setAuthMessage('❌ ' + (result.message || '验证码错误'), 'error');
                }
            } catch (err) {
                console.error(err);
                setAuthMessage('❌ 网络错误', 'error');
            } finally {
                setLoading(false);
            }
        };

        // ==========================================
        // 7. 进入聊天
        // ==========================================
        function enterChat() {
            authSection.classList.add('hidden');
            chatSection.classList.remove('hidden');
            currentUserSpan.textContent = currentEmail;
            messageList.innerHTML = '';
            localStorage.setItem('minichat_user', JSON.stringify({ email: currentEmail }));
            subscribeMessages();
            loadHistory();
        }

        // ==========================================
        // 8. 退出登录
        // ==========================================
        window.handleLogout = function() {
            if (window.chatChannel) {
                window.chatChannel.unsubscribe();
                window.chatChannel = null;
            }
            currentEmail = '';
            chatSection.classList.add('hidden');
            authSection.classList.remove('hidden');
            authMessage.textContent = '';
            messageList.innerHTML = '';
            authCode.value = '';
            localStorage.removeItem('minichat_user');
            setAuthMessage('已退出', '');
        };

        // ==========================================
        // 9. 发送消息核心
        // ==========================================
        async function sendMessageContent(content) {
            if (!currentEmail) {
                alert('请先登录');
                return;
            }
            addMessage(content, '我', true);

            try {
                const res = await fetch(WEBHOOK_SEND_MESSAGE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, sender_name: currentEmail })
                });
                if (!res.ok) throw new Error('发送失败');
                if (chatInput.value) chatInput.value = '';
            } catch (err) {
                console.error(err);
                if (messageList.lastChild) messageList.removeChild(messageList.lastChild);
                setAuthMessage('❌ 消息发送失败', 'error');
                setTimeout(() => {
                    if (authMessage.textContent === '❌ 消息发送失败') authMessage.textContent = '';
                }, 3000);
            }
        }

        // ==========================================
        // 10. 发送文本
        // ==========================================
        window.sendMessageHandler = async function() {
            const content = chatInput.value.trim();
            if (!content) return;
            await sendMessageContent(content);
        };

        // ==========================================
        // 11. 发送图片
        // ==========================================
        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                setAuthMessage('请选择图片文件', 'error');
                fileInput.value = '';
                return;
            }
            if (file.size > 20 * 1024 * 1024) {
                setAuthMessage('图片不能超过 20MB', 'error');
                fileInput.value = '';
                return;
            }

            const tempId = 'uploading_' + Date.now();
            const tempDiv = document.createElement('div');
            tempDiv.id = tempId;
            tempDiv.className = 'message me';
            tempDiv.innerHTML = '<div class="sender">我</div><span style="opacity:0.6;">⏳ 上传中...</span>';
            messageList.appendChild(tempDiv);
            messageList.scrollTop = messageList.scrollHeight;

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.${fileExt}`;
                const filePath = `public/${fileName}`;

                const { data, error } = await window.supabaseClient.storage
                    .from('chat-images')
                    .upload(filePath, file, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (error) throw error;

                const { data: urlData } = window.supabaseClient.storage
                    .from('chat-images')
                    .getPublicUrl(filePath);
                const publicURL = urlData.publicUrl;

                const tempEl = document.getElementById(tempId);
                if (tempEl) tempEl.remove();

                const content = `![image](${publicURL})`;
                await sendMessageContent(content);
            } catch (err) {
                console.error('上传失败:', err);
                const tempEl = document.getElementById(tempId);
                if (tempEl) tempEl.remove();
                setAuthMessage('❌ 图片上传失败，请重试', 'error');
                setTimeout(() => {
                    if (authMessage.textContent === '❌ 图片上传失败，请重试') authMessage.textContent = '';
                }, 3000);
            } finally {
                fileInput.value = '';
            }
        });

        // ==========================================
        // 12. 加载历史
        // ==========================================
        async function loadHistory() {
            try {
                const { data, error } = await window.supabaseClient
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: true })
                    .limit(50);
                if (error) throw error;
                messageList.innerHTML = '';
                data.forEach(msg => {
                    const isMe = msg.sender_name === currentEmail;
                    addMessage(msg.content, msg.sender_name || '匿名', isMe, formatTime(msg.created_at));
                });
            } catch (err) {
                console.error('加载历史消息失败:', err);
            }
        }

        // ==========================================
        // 13. 订阅实时
        // ==========================================
        function subscribeMessages() {
            if (window.chatChannel) {
                window.chatChannel.unsubscribe();
                window.chatChannel = null;
            }
            const channel = window.supabaseClient
                .channel('chat-room')
                .on(
                    'postgres_changes', {
                        event: 'INSERT',
                        schema: 'public',
                        table: 'messages'
                    },
                    (payload) => {
                        const msg = payload.new;
                        const lastMsg = messageList.lastChild;
                        if (lastMsg && lastMsg.textContent.includes(msg.content) && msg.sender_name === currentEmail)
                            return;
                        const isMe = msg.sender_name === currentEmail;
                        addMessage(msg.content, msg.sender_name || '匿名', isMe, formatTime(msg.created_at));
                    }
                )
                .subscribe(status => {
                    if (status === 'SUBSCRIBED') console.log('✅ 已连接到实时频道！');
                });
            window.chatChannel = channel;
        }

        // ==========================================
        // 14. 检查本地会话
        // ==========================================
        function checkStoredSession() {
            const stored = localStorage.getItem('minichat_user');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    if (data.email) {
                        currentEmail = data.email;
                        enterChat();
                        return true;
                    }
                } catch (e) { /* ignore */ }
            }
            return false;
        }

        // ==========================================
        // 15. 绑定事件
        // ==========================================
        btnSendCode.addEventListener('click', window.handleSendCode);
        btnLogin.addEventListener('click', window.handleLogin);
        btnSend.addEventListener('click', window.sendMessageHandler);
        btnLogout.addEventListener('click', window.handleLogout);

        authCode.addEventListener('keydown', e => { if (e.key === 'Enter') window.handleLogin(); });
        authEmail.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                authCode.value ? window.handleLogin() : window.handleSendCode();
            }
        });
        chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') window.sendMessageHandler(); });

        // ==========================================
        // 16. 启动
        // ==========================================
        if (!checkStoredSession()) {
            console.log('💬 MiniChat 已启动，请登录');
        }
        console.log('🔑 Auth Webhook:', WEBHOOK_AUTH);
        console.log('📨 Send Message Webhook:', WEBHOOK_SEND_MESSAGE);
    </script>
</body>
</html>
