<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>MiniChat · 服务协议</title>
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="favicon.ico">
    <style>
        :root{--bg-primary:#0a0a0a;--bg-secondary:#111111;--bg-sidebar:#0d0d0d;--bg-card:#161616;--bg-input:#1c1c1c;--bg-hover:#202020;--text-primary:#f1f1f1;--text-secondary:#a5a5a5;--text-muted:#6a6a6a;--accent:#3b82f6;--accent-hover:#2563eb;--accent-light:rgba(59,130,246,0.15);--border-color:#262626;--shadow:0 8px 32px rgba(0,0,0,0.4);--shadow-sm:0 2px 8px rgba(0,0,0,0.25);--radius:16px;--radius-sm:10px;--radius-lg:20px;--transition:0.25s cubic-bezier(0.4,0,0.2,1);--transition-fast:0.15s cubic-bezier(0.4,0,0.2,1);--success:#4ade80;--error:#f87171;--scrollbar-thumb:#4a4a4a;--scrollbar-thumb-hover:#5a5a5a;--code-bg:rgba(255,255,255,0.08);--code-border:rgba(128,128,128,0.15);--link-color:#60a5fa;--quote-border:#3b82f6;--quote-bg:rgba(59,130,246,0.1);--modal-overlay:rgba(0,0,0,0.75)}
        body.light-theme{--bg-primary:#fafafa;--bg-secondary:#ffffff;--bg-sidebar:#f8f9fa;--bg-card:#ffffff;--bg-input:#f1f3f5;--bg-hover:#e9ecef;--text-primary:#1a1a1a;--text-secondary:#5c636a;--text-muted:#9da4ab;--border-color:#e9ecef;--shadow:0 8px 32px rgba(0,0,0,0.06);--shadow-sm:0 2px 8px rgba(0,0,0,0.04);--code-bg:rgba(0,0,0,0.05);--code-border:rgba(0,0,0,0.08);--link-color:#2563eb;--quote-bg:rgba(59,130,246,0.05);--scrollbar-thumb:#cbd5e1;--scrollbar-thumb-hover:#94a3b8;--modal-overlay:rgba(0,0,0,0.5)}
        ::-webkit-scrollbar{width:6px;height:6px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px;border:none}
        ::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-thumb-hover)}
        *{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
        body{font-family:"MiSans","MiSans Latin","Xiaomi Lan Ting Pro","Inter","SF Pro Display","PingFang SC","Microsoft YaHei","Segoe UI",Roboto,sans-serif;background:var(--bg-secondary);color:var(--text-primary);line-height:1.7;font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;transition:background .3s,color .3s;min-height:100vh}
        a{color:var(--link-color);text-decoration:none;transition:color var(--transition-fast)}
        a:hover{color:var(--accent)}
        *:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

        .topbar{position:sticky;top:0;z-index:50;background:var(--bg-secondary);border-bottom:1px solid var(--border-color);backdrop-filter:saturate(180%) blur(8px);-webkit-backdrop-filter:saturate(180%) blur(8px);background:color-mix(in srgb,var(--bg-secondary) 85%,transparent)}
        .progress-bar{position:fixed;top:65px;left:0;height:2px;width:100%;background:var(--accent);transform-origin:0 50%;transform:scaleX(0);z-index:49;pointer-events:none;transition:opacity var(--transition-fast);will-change:transform}
        .topbar-inner{max-width:1200px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
        .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:var(--text-primary)}
        .brand img{height:24px}
        .brand-sub{font-size:13px;font-weight:500;color:var(--text-secondary);margin-left:6px}
        .topbar-actions{display:flex;align-items:center;gap:6px}
        .icon-btn{background:none;border:1px solid var(--border-color);color:var(--text-secondary);cursor:pointer;padding:5px 9px;border-radius:var(--radius-sm);transition:all var(--transition-fast);font-size:13px;display:inline-flex;align-items:center;gap:4px;font-family:inherit}
        .icon-btn:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--accent)}
        .lang-switch{display:inline-flex;align-items:center;gap:0;background:transparent;border:1px solid var(--border-color);border-radius:var(--radius-sm);overflow:hidden;padding:0}
        .lang-switch .lang-opt{padding:6px 10px;font-size:12px;color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast);border:none;background:transparent;font-family:inherit;border-right:1px solid var(--border-color)}
        .lang-switch .lang-opt:last-child{border-right:none}
        .lang-switch .lang-opt:hover{background:var(--bg-hover);color:var(--text-primary)}
        .lang-switch .lang-opt.active{background:var(--accent);color:#fff}

        .layout{max-width:1200px;margin:0 auto;padding:24px 20px 60px;display:grid;grid-template-columns:240px 1fr;gap:24px;align-items:start}
        .sidebar{position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow-sm)}
        .sidebar h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;margin-bottom:8px;padding:4px 10px}
        .toc{list-style:none;display:flex;flex-direction:column;gap:2px}
        .toc li{margin:0}
        .toc a{display:flex;align-items:center;gap:8px;padding:8px 10px;color:var(--text-secondary);border-radius:var(--radius-sm);font-size:13px;transition:all var(--transition-fast);border-left:2px solid transparent;font-weight:500}
        .toc a .toc-num{font-size:11px;color:var(--text-muted);font-weight:600;min-width:16px}
        .toc a:hover{color:var(--text-primary);background:var(--bg-hover);border-left-color:var(--border-color)}
        .toc a.active{color:var(--accent);background:var(--accent-light);border-left-color:var(--accent);font-weight:600}
        .toc a.active .toc-num{color:var(--accent)}

        .content{min-width:0;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:36px 44px;box-shadow:var(--shadow-sm)}
        .doc-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border-color)}
        .doc-header h1{font-size:24px;font-weight:700;color:var(--text-primary);margin-bottom:8px;letter-spacing:-0.3px}
        .doc-meta{display:flex;gap:14px;flex-wrap:wrap;color:var(--text-muted);font-size:12px;align-items:center}
        .doc-meta .version-tag{background:var(--bg-input);color:var(--text-secondary);padding:2px 8px;border-radius:var(--radius-sm);font-weight:500;font-size:11px;border:1px solid var(--border-color)}

        .section{margin-bottom:28px;scroll-margin-top:80px}
        .section:last-child{margin-bottom:0}
        .section h2{font-size:18px;font-weight:600;color:var(--text-primary);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-color);display:flex;align-items:baseline;gap:10px}
        .section h2 .sec-num{font-size:14px;color:var(--text-secondary);font-weight:600;letter-spacing:1px;font-variant-numeric:tabular-nums}
        .section h3{font-size:15px;font-weight:600;color:var(--text-primary);margin:18px 0 8px;display:flex;align-items:baseline;gap:6px}
        .section h3 .sub-num{font-size:12px;color:var(--text-muted);font-weight:600;font-variant-numeric:tabular-nums}
        .section p{color:var(--text-secondary);margin-bottom:10px;font-size:14px;line-height:1.8}
        .section p strong{color:var(--text-primary);font-weight:600}
        .section ul,.section ol{margin:0 0 12px 22px;color:var(--text-secondary);font-size:14px}
        .section li{margin-bottom:5px;line-height:1.75}
        .section li::marker{color:var(--text-muted)}
        .section code{background:var(--code-bg);padding:1px 6px;border-radius:4px;font-size:.9em;font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;border:1px solid var(--code-border)}
        .section .callout{background:var(--quote-bg);border-left:2px solid var(--quote-border);padding:10px 14px;margin:12px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:var(--text-primary);font-size:13px}
        .section .callout strong{color:var(--accent)}

        .back-to-top{position:fixed;right:20px;bottom:20px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all var(--transition-fast);z-index:40}
        .back-to-top.show{display:flex}
        .back-to-top:hover{background:var(--accent-hover);transform:translateY(-2px)}

        .footer{max-width:1200px;margin:0 auto;padding:20px;border-top:1px solid var(--border-color);color:var(--text-muted);font-size:12px;text-align:center}
        .footer a{color:var(--link-color);margin-left:4px}

        @media (max-width:900px){
            .layout{grid-template-columns:1fr;gap:16px;padding:16px 12px 40px}
            .sidebar{position:static;max-height:none;padding:10px}
            .toc{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:2px}
            .toc a{padding:6px 8px;font-size:12px}
            .content{padding:20px 18px}
            .doc-header h1{font-size:20px}
            .section h2{font-size:16px}
            .section h3{font-size:14px}
            .topbar-inner{padding:10px 12px}
            .brand{font-size:14px}
            .brand-sub{display:none}
            .progress-bar{top:61px}
        }
        @media (max-width:480px){
            .toc{grid-template-columns:1fr}
            .content{padding:16px 14px}
            .footer{font-size:11px;flex-direction:column}
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <img src="assets/logo.svg" alt="MiniChat">
                <span class="brand-sub" id="brandText">服务协议</span>
            </div>

                <a href="index.html" class="icon-btn" id="backBtn">← 返回</a>
                <button class="icon-btn" id="themeToggle" title="切换主题">
                    <svg id="themeIcon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <div class="lang-switch" role="group" aria-label="语言切换">
                    <button class="lang-opt" data-lang="zh" aria-pressed="true">中文</button>
                    <button class="lang-opt" data-lang="en" aria-pressed="false">EN</button>
                </div>
            </div>
        </div>
    </header>
    <div class="progress-bar" id="progressBar" aria-hidden="true"></div>

    <main class="layout">

            <h4 id="tocTitle">目录</h4>

        <article class="content">
            <div class="doc-header">
                <h1 id="docTitle">服务协议</h1>
                <div class="doc-meta">
                    <span class="version-tag" id="versionBadge">v4.0.0</span>
                    <span id="lastUpdated">更新于 2026-07-13</span>
                </div>
            </div>

            <div id="contentZh" class="lang-content"></div>
            <div id="contentEn" class="lang-content" style="display:none"></div>
        </article>
    </main>

    <button class="back-to-top" id="backToTop" title="返回顶部" aria-label="返回顶部">↑</button>

    <footer class="footer">
        <span id="footerText">© 2026 MiniChat</span>
        <span> · </span>
        <a href="index.html" id="footerBack">返回主站</a>

    zh: [
        { h3: '1.1 协议接受', html: '<p>本协议是您与 MiniChat 运营方之间就使用 MiniChat 服务所订立的协议。使用本服务即视为您已知悉并同意本协议全部内容。</p><p>如您不同意任何条款，请立即停止使用本服务。</p>' },

        { h3: '1.5 服务变更与终止', html: '<p>MiniChat 运营方有权根据业务需要修改、暂停或终止本服务的全部或部分功能，无需事先征得您的同意。重大变更将通过站内通知或邮件公告。</p><p>如您违反本协议，MiniChat 运营方有权立即暂停或终止您的账户及服务，且无需承担任何责任。</p>' },
        { h3: '1.6 免责声明', html: '<p>本服务按"现状"提供。MiniChat 运营方不对服务的及时性、安全性、可用性、准确性作出任何明示或暗示的保证。因不可抗力（包括自然灾害、网络攻击、电信运营商故障、政府行为等）导致的服务中断或数据丢失，MiniChat 运营方将尽力恢复但不承担责任。</p>' },
        { h3: '1.7 法律适用与争议解决', html: '<p>本协议的订立、执行和解释均适用中华人民共和国法律。因本协议产生的争议，双方应友好协商；协商不成的，任何一方均有权将争议提交至 MiniChat 运营方所在地有管辖权的人民法院。</p>' }

    en: [
        { h3: '1.1 Acceptance', html: '<p>This Agreement constitutes a contract between you and the MiniChat operator regarding your use of the Service. By using the Service, you acknowledge and agree to all terms herein.</p><p>If you do not agree to any term, please stop using the Service immediately.</p>' },
        { h3: '1.2 Account Registration', html: '<ul><li>You must be at least 13 years old.</li><li>Register with a real and valid email address.</li><li>Each natural person may register and maintain only one MiniChat account.</li><li>You are responsible for safeguarding your account and password; losses caused by your own disclosure or negligence are yours to bear.</li></ul>' },
        { h3: '1.3 User Conduct', html: '<p>You agree to comply with applicable laws and social morality. You shall not:</p><ul><li>Create, upload, or distribute content that violates national laws, endangers national security, advocates cults or superstitions, or disseminates obscenity or violence;</li><li>Post content that infringes on the intellectual property, reputation, portrait, or privacy rights of others;</li><li>Engage in commercial advertising, spam, harassment, or malicious marketing;</li><li>Use technical means to artificially inflate views, reviews, or likes;</li><li>Conduct cyber attacks, virus distribution, data theft, or account hijacking;</li><li>Engage in any other conduct that violates laws or Service rules.</li></ul>' },
        { h3: '1.4 Intellectual Property', html: '<p>All content included in the Service (including text, images, audio, video, software, interface design, code, data) is the property of the MiniChat operator or its licensors.</p><p>You retain copyright to original content you post, while granting the MiniChat operator a worldwide, royalty-free, irrevocable, non-exclusive license to use, reproduce, modify, compile, and distribute such content within the Service and related promotions.</p>' },

CONTENT['privacy-policy'] = {
    zh: [
        { h3: '2.1 适用范围', html: '<p>本政策适用于 MiniChat 运营方向您提供的全部服务，包括聊天、消息推送、文件传输、个人资料展示、社交互动等。当您通过第三方平台使用本服务时，本政策同样适用。</p>' },
        { h3: '2.2 信息收集', html: '<p>为提供完整、稳定、安全的服务，我们会在以下场景中收集您的信息：</p><ul><li>账户注册信息：电子邮箱、显示名称、头像；</li><li>使用信息：登录时间、在线状态、最后活跃时间；</li><li>内容信息：您主动发布、发送、上传的文字、图片、音频、视频、文件等；</li><li>设备信息：浏览器类型、操作系统、语言设置、屏幕分辨率、IP 地址；</li><li>Cookie 与本地存储：用于保存登录状态、主题偏好、语言设置、消息草稿。</li></ul>' },

function applyTheme(theme) {
    document.body.classList.toggle('light-theme', theme === 'light');
}

function getCurrentTheme() {
    var saved = localStorage.getItem('minichat_theme');
    if (saved && saved !== 'auto') return saved;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyLang(lang) {
    var data = I18N[lang];
    if (!data) return;
    document.body.dataset.lang = lang;
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.title = lang === 'zh' ? 'MiniChat · 服务协议' : 'MiniChat · Service Agreement';
    var el;
    if ((el = document.getElementById('tocTitle'))) el.textContent = data.tocTitle;
    if ((el = document.getElementById('brandText'))) el.textContent = lang === 'zh' ? '服务协议' : 'Service Agreement';
    if ((el = document.getElementById('docTitle'))) el.textContent = data.docTitle;
    if ((el = document.getElementById('lastUpdated'))) el.textContent = data.lastUpdated;
    if ((el = document.getElementById('backBtn'))) el.textContent = data.backBtn;
    if ((el = document.getElementById('footerText'))) el.textContent = data.footerText;
    if ((el = document.getElementById('footerBack'))) el.textContent = data.footerBack;
    if ((el = document.getElementById('contentZh'))) el.style.display = lang === 'zh' ? 'block' : 'none';
    if ((el = document.getElementById('contentEn'))) el.style.display = lang === 'en' ? 'block' : 'none';
    document.querySelectorAll('.lang-opt').forEach(function(b) {
        var active = b.dataset.lang === lang;
        b.classList.toggle('active', active);
        b.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
}

function buildTOC() {
    var lang = document.body.dataset.lang || 'zh';
    var data = I18N[lang];
    var toc = document.getElementById('toc');
    toc.innerHTML = '';
    data.sections.forEach(function(s) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + s.id;
        a.dataset.target = s.id;
        a.innerHTML = '<span class="toc-num">' + s.num + '</span><span>' + s.toc + '</span>';
        a.addEventListener('click', function(e) {
            e.preventDefault();
            var target = document.getElementById(s.id);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        li.appendChild(a);
        toc.appendChild(li);
    });
}

function buildContent() {
    var zh = document.getElementById('contentZh');
    var en = document.getElementById('contentEn');
    zh.innerHTML = '';
    en.innerHTML = '';
    var keys = ['user-agreement', 'privacy-policy', 'third-party-sharing', 'data-collection', 'app-permissions'];
    var enTitles = {
        'user-agreement': 'I. User Agreement',
        'privacy-policy': 'II. Privacy Policy',
        'third-party-sharing': 'III. Third-Party Information Sharing',
        'data-collection': 'IV. Personal Information Collection',
        'app-permissions': 'V. App Permissions Statement'
    };
    keys.forEach(function(key, idx) {
        var secZh = document.createElement('section');
        secZh.className = 'section';
        secZh.id = key;
        var h2zh = document.createElement('h2');
        h2zh.innerHTML = '<span class="sec-num">' + I18N.zh.sections[idx].num + '</span><span>' + I18N.zh.sections[idx].title + '</span>';
        secZh.appendChild(h2zh);
        CONTENT[key].zh.forEach(function(block) {
            var h3 = document.createElement('h3');
            var parts = block.h3.split(' ');
            h3.innerHTML = '<span class="sub-num">' + parts[0] + '</span><span>' + parts.slice(1).join(' ') + '</span>';
            secZh.appendChild(h3);
            var wrap = document.createElement('div');
            wrap.innerHTML = block.html;
            secZh.appendChild(wrap);
        });
        zh.appendChild(secZh);

        var secEn = document.createElement('section');
        secEn.className = 'section';
        secEn.id = key + '-en';
        var h2en = document.createElement('h2');
        h2en.innerHTML = '<span class="sec-num">' + I18N.en.sections[idx].num + '</span><span>' + enTitles[key] + '</span>';
        secEn.appendChild(h2en);
        CONTENT[key].en.forEach(function(block) {
            var h3 = document.createElement('h3');
            var parts = block.h3.split(' ');
            h3.innerHTML = '<span class="sub-num">' + parts[0] + '</span><span>' + parts.slice(1).join(' ') + '</span>';
            secEn.appendChild(h3);
            var wrap = document.createElement('div');
            wrap.innerHTML = block.html;
            secEn.appendChild(wrap);
        });
        en.appendChild(secEn);
    });
}

function setupTheme() {
    applyTheme(getCurrentTheme());
    var toggle = document.getElementById('themeToggle');
    if (!toggle) return;
    toggle.onclick = function() {
        var current = getCurrentTheme();
        var next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem('minichat_theme', next);
        applyTheme(next);
    };
}

function setupBackToTop() {
    var btn = document.getElementById('backToTop');
    var progress = document.getElementById('progressBar');
    window.addEventListener('scroll', function() {
        var scrollTop = window.scrollY;
        var docHeight = document.documentElement.scrollHeight - window.innerHeight;
        var progress_ = docHeight > 0 ? Math.min(scrollTop / docHeight, 1) : 0;
        if (progress) progress.style.transform = 'scaleX(' + progress_ + ')';
        btn.classList.toggle('show', scrollTop > 300);
    });
    btn.onclick = function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };
}

function setupScrollSpy() {
    var sections = document.querySelectorAll('.section');
    var tocLinks = document.querySelectorAll('.toc a');
    window.addEventListener('scroll', function() {
        var scrollY = window.scrollY + 100;
        var active = null;
        for (var i = sections.length - 1; i >= 0; i--) {
            if (sections[i] && sections[i].getBoundingClientRect().top + window.scrollY <= scrollY) {
                active = sections[i].id;
                break;
            }
        }
        if (!active && sections.length) active = sections[0].id;
        tocLinks.forEach(function(a) {
            a.classList.toggle('active', a.dataset.target === active);
        });
    });
}

function setupLang() {
    var switchEl = document.querySelector('.lang-switch');
    if (!switchEl) return;
    switchEl.onclick = function(e) {
        var btn = e.target;
        while (btn && btn !== switchEl) {
            if (btn.classList && btn.classList.contains('lang-opt')) {
                var lang = btn.dataset && btn.dataset.lang;
                if (lang) setLang(lang);
                break;
            }
            btn = btn.parentNode;
        }
    };
}

function setLang(lang) {
    document.body.dataset.lang = lang;
    localStorage.setItem('minichat_lang', lang);
    buildTOC();
    buildContent();
    applyLang(lang);
    setupScrollSpy();
}

function init() {
    try {
        var saved = localStorage.getItem('minichat_lang');
        var lang = (saved && saved !== 'system' && (saved === 'zh' || saved === 'en')) ? saved : 
                   ((navigator.language || '').toLowerCase().indexOf('zh') === 0 ? 'zh' : 'en');
        document.body.dataset.lang = lang;
        buildTOC();
        buildContent();
        applyLang(lang);
        setupTheme();
        setupBackToTop();
        setupScrollSpy();
        setupLang();
    } catch (e) {
        console.error('agreements.html init error:', e);
    }
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
