    <style>
        :root {
            --bg: #ffffff;
            --bg-soft: #f7f8fa;
            --bg-card: #ffffff;
            --bg-sidebar: #fafbfc;
            --text: #1a1a1a;
            --text-soft: #4a5568;
            --text-muted: #8a94a6;
            --border: #e5e7eb;
            --border-soft: #eef0f4;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-soft: #eef2ff;
            --link: #4f46e5;
            --shadow: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06);
            --shadow-lg: 0 10px 40px rgba(0,0,0,.08);
            --code-bg: #f3f4f6;
            --quote-border: #d1d5db;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f1115;
                --bg-soft: #15181f;
                --bg-card: #1a1d24;
                --bg-sidebar: #0f1115;
                --text: #e5e7eb;
                --text-soft: #9ca3af;
                --text-muted: #6b7280;
                --border: #2a2f3a;
                --border-soft: #20242c;
                --accent: #818cf8;
                --accent-hover: #a5b4fc;
                --accent-soft: #1e1b4b;
                --link: #a5b4fc;
                --shadow: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
                --shadow-lg: 0 10px 40px rgba(0,0,0,.4);
                --code-bg: #1f242c;
                --quote-border: #3a3f4b;
            }
        }
        body[data-theme="light"] {
            --bg: #ffffff;
            --bg-soft: #f7f8fa;
            --bg-card: #ffffff;
            --bg-sidebar: #fafbfc;
            --text: #1a1a1a;
            --text-soft: #4a5568;
            --text-muted: #8a94a6;
            --border: #e5e7eb;
            --border-soft: #eef0f4;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-soft: #eef2ff;
            --link: #4f46e5;
            --code-bg: #f3f4f6;
            --quote-border: #d1d5db;
        }
        body[data-theme="dark"] {
            --bg: #0f1115;
            --bg-soft: #15181f;
            --bg-card: #1a1d24;
            --bg-sidebar: #0f1115;
            --text: #e5e7eb;
            --text-soft: #9ca3af;
            --text-muted: #6b7280;
            --border: #2a2f3a;
            --border-soft: #20242c;
            --accent: #818cf8;
            --accent-hover: #a5b4fc;
            --accent-soft: #1e1b4b;
            --link: #a5b4fc;
            --code-bg: #1f242c;
            --quote-border: #3a3f4b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        a { color: var(--link); text-decoration: none; transition: color .2s; }
        a:hover { color: var(--accent-hover); }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            backdrop-filter: saturate(180%) blur(8px);
            -webkit-backdrop-filter: saturate(180%) blur(8px);
            background: color-mix(in srgb, var(--bg) 85%, transparent);
        }
        .topbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
        }
        .brand img { height: 28px; }
        .topbar-actions { display: flex; align-items: center; gap: 8px; }
        .lang-switch, .theme-toggle, .back-btn {
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-soft);
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .lang-switch:hover, .theme-toggle:hover, .back-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }
        .back-btn { text-decoration: none; }
        .lang-switch .active { color: var(--accent); font-weight: 600; }

        .layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 80px;
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 40px;
        }
        .sidebar {
            position: sticky;
            top: 80px;
            align-self: start;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            padding-right: 8px;
        }
        .sidebar h4 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 12px;
            padding-left: 12px;
        }
        .toc { list-style: none; }
        .toc li { margin: 2px 0; }
        .toc a {
            display: block;
            padding: 8px 12px;
            color: var(--text-soft);
            border-radius: 6px;
            font-size: 14px;
            border-left: 2px solid transparent;
            transition: all .2s;
        }
        .toc a:hover {
            color: var(--accent);
            background: var(--accent-soft);
            border-left-color: var(--accent);
        }
        .toc a.active {
            color: var(--accent);
            background: var(--accent-soft);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        .content {
            max-width: 800px;
            min-width: 0;
        }
        .doc-header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border-soft); }
        .doc-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }
        .doc-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            color: var(--text-muted);
            font-size: 13px;
        }
        .doc-meta .badge {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .section {
            margin-bottom: 48px;
            scroll-margin-top: 80px;
        }
        .section h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section h2 .num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            padding: 0 8px;
        }
        .section h3 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            margin: 20px 0 10px;
        }
        .section p {
            color: var(--text-soft);
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.8;
        }
        .section ul, .section ol {
            margin: 0 0 16px 24px;
            color: var(--text-soft);
        }
        .section li { margin-bottom: 6px; line-height: 1.7; }
        .section code {
            background: var(--code-bg);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: .9em;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        }
        .section .highlight {
            background: var(--accent-soft);
            border-left: 3px solid var(--accent);
            padding: 12px 16px;
            border-radius: 6px;
            margin: 16px 0;
            color: var(--text);
        }
        .section .last-updated {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 8px;
        }

        .back-to-top {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-lg);
            transition: all .2s;
            z-index: 50;
        }
        .back-to-top.show { display: flex; }
        .back-to-top:hover { background: var(--accent-hover); transform: translateY(-2px); }

        .footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
        }
        .footer a { color: var(--accent); }

        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; gap: 20px; padding: 20px 16px 60px; }
            .sidebar {
                position: static;
                max-height: none;
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 12px 16px;
                background: var(--bg-soft);
            }
            .toc { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
            .toc a { padding: 6px 8px; font-size: 13px; }
            .doc-header h1 { font-size: 24px; }
            .section h2 { font-size: 19px; }
            .section h3 { font-size: 16px; }
            .topbar-inner { padding: 12px 16px; flex-wrap: wrap; }
            .brand { font-size: 15px; }
        }
        @media (max-width: 480px) {
            .toc { grid-template-columns: 1fr; }
            .topbar-actions { gap: 6px; }
            .lang-switch, .theme-toggle, .back-btn { font-size: 12px; padding: 5px 9px; }
        }
    </style>
</head>

                    <li><strong>Purpose:</strong> Save login state, user preferences, message drafts, unsent content</li>
                    <li><strong>Request timing:</strong> Automatically used on first visit, no user authorization required</li>
                    <li><strong>Required:</strong> Yes. Disabling may result in inability to stay logged in or loss of drafts</li>
                    <li><strong>How to revoke:</strong> Browser settings → Site data → Delete</li>
                </ul>

                <h3>5.3 Microphone Permission (Voice Messages Only)</h3>
                <ul>
                    <li><strong>Purpose:</strong> Record and send voice messages</li>
                    <li><strong>Request timing:</strong> The browser automatically prompts when you click the voice record button</li>
                    <li><strong>Required:</strong> No. Declining does not affect other core features</li>
                </ul>

                <h3>5.4 Camera Permission (Photo Capture Only)</h3>
                <ul>
                    <li><strong>Purpose:</strong> Capture and send photos</li>
                    <li><strong>Request timing:</strong> The browser automatically prompts when you click the camera button</li>
                    <li><strong>Required:</strong> No. Declining does not affect other core features</li>
                </ul>

                <h3>5.5 Clipboard Permission (File Paste Only)</h3>
                <ul>
                    <li><strong>Purpose:</strong> Identify images, files, and other content you paste</li>
                    <li><strong>Request timing:</strong> Automatically requested when using Ctrl/Cmd + V to paste files</li>
                    <li><strong>Required:</strong> No</li>
                </ul>

                <h3>5.6 Background Run Permission (PWA)</h3>
                <ul>
                    <li><strong>Purpose:</strong> After installing the PWA, keep messages received in real time</li>
                    <li><strong>Required:</strong> No. When disabled, messages will load the next time you open the app</li>
                </ul>

                <h3>5.7 Permission Overview</h3>
                <p>This application follows the principle of "request on demand, minimum authorization." Apart from local storage (used for basic functions), all other permissions are optional. We will never access your device, read your data, or perform any background activity without your knowledge.</p>
            `
        }
    }
];

function applyLang(lang) {
    document.body.dataset.lang = lang;
    document.documentElement.lang = (lang === 'zh' ? 'zh-CN' : 'en');
    document.getElementById('langZh').classList.toggle('active', lang === 'zh');
    document.getElementById('langEn').classList.toggle('active', lang === 'en');
    document.getElementById('tocTitle').textContent = I18N.tocTitle[lang];
    document.getElementById('brandText').textContent = I18N.brandText[lang];
    document.getElementById('backBtn').textContent = I18N.backBtn[lang];
    document.getElementById('footerText').textContent = I18N.footerText[lang];

    document.getElementById('docTitle').textContent = (lang === 'zh' ? 'MiniChat 服务协议' : 'MiniChat Service Agreement');
    document.getElementById('contentZh').style.display = (lang === 'zh' ? 'block' : 'none');
    document.getElementById('contentEn').style.display = (lang === 'en' ? 'block' : 'none');
}

function buildTOC() {
    var lang = document.body.dataset.lang || 'zh';
    var toc = document.getElementById('toc');
    toc.innerHTML = '';
    SECTIONS.forEach(function(s, i) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + s.id;
        a.textContent = lang === 'zh' ? s.tocZh : s.tocEn;
        a.dataset.target = s.id;
        a.addEventListener('click', function(e) {
            e.preventDefault();
            var target = document.getElementById(s.id);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        li.appendChild(a);
        toc.appendChild(li);
    });
}

function buildContent() {
    var zh = document.getElementById('contentZh');
    var en = document.getElementById('contentEn');
    zh.innerHTML = '';
    en.innerHTML = '';
    SECTIONS.forEach(function(s) {
        var secZh = document.createElement('section');
        secZh.className = 'section';
        secZh.id = s.id;
        secZh.innerHTML = s.zh.html;
        var h2zh = document.createElement('h2');
        h2zh.innerHTML = '<span class="num">' + s.zh.title.split('、')[0] + '</span>' + s.zh.title.split('、').slice(1).join('、');
        secZh.insertBefore(h2zh, secZh.firstChild);
        zh.appendChild(secZh);

        var secEn = document.createElement('section');
        secEn.className = 'section';
        secEn.id = s.id + '-en';
        secEn.innerHTML = s.en.html;
        var h2en = document.createElement('h2');
        var enTitle = s.en.title;
        var parts = enTitle.split(' ');
        h2en.innerHTML = '<span class="num">' + parts[0] + '</span>' + parts.slice(1).join(' ');
        secEn.insertBefore(h2en, secEn.firstChild);
        en.appendChild(secEn);
    });
}

function setupTheme() {
    var saved = localStorage.getItem('minichat_agreement_theme');
    if (saved) {
        document.body.dataset.theme = saved;
    }
    var toggle = document.getElementById('themeToggle');
    toggle.addEventListener('click', function() {
        var current = document.body.dataset.theme;
        var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = current ? (current === 'dark') : sysDark;
        var next = isDark ? 'light' : 'dark';
        document.body.dataset.theme = next;
        localStorage.setItem('minichat_agreement_theme', next);
    });
}

function setupBackToTop() {
    var btn = document.getElementById('backToTop');
    window.addEventListener('scroll', function() {
        if (window.scrollY > 400) btn.classList.add('show');
        else btn.classList.remove('show');
    });
    btn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
}

function setupScrollSpy() {
    var sections = SECTIONS.map(function(s) { return document.getElementById(s.id); });
    var tocLinks = document.querySelectorAll('.toc a');
    window.addEventListener('scroll', function() {
        var scrollY = window.scrollY + 120;
        var active = null;
        for (var i = sections.length - 1; i >= 0; i--) {
            if (sections[i] && sections[i].offsetTop <= scrollY) {
                active = sections[i].id;
                break;
            }
        }
        tocLinks.forEach(function(a) {
            a.classList.toggle('active', a.dataset.target === active);
        });
    });
}

function init() {
    var saved = localStorage.getItem('minichat_agreement_lang');
    var lang;
    if (saved) {
        lang = saved;
    } else {
        var browserLang = (navigator.language || '').toLowerCase();
        lang = browserLang.indexOf('zh') === 0 ? 'zh' : 'en';
    }
    document.body.dataset.lang = lang;
    buildTOC();
    buildContent();
    applyLang(lang);
    setupTheme();
    setupBackToTop();
    setupScrollSpy();

    document.getElementById('langZh').addEventListener('click', function() { setLang('zh'); });
    document.getElementById('langEn').addEventListener('click', function() { setLang('en'); });
}

function setLang(lang) {
    document.body.dataset.lang = lang;
    localStorage.setItem('minichat_agreement_lang', lang);
    buildTOC();
    applyLang(lang);
    setTimeout(function() { buildContent(); applyLang(lang); setupScrollSpy(); }, 0);
}

init();
</script>
</body>
</html>
